      const { useState, useEffect, useRef, useCallback, useContext, createContext } = React;

      // ── Auth & localStorage ────────────────────────────────────────────────
      const LS_USERS   = 'pp_users_v2';
      const LS_SESSION = 'pp_session_v2';

      const readJSON = (key, fallback) => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; } };
      const writeJSON = (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} };

      const DEFAULT_TASKS = [
        { id:1, text:'Submit SAT / national exam registration', done:false, tag:'Exam' },
        { id:2, text:'Write personal statement draft',          done:false, tag:'Essay' },
        { id:3, text:'Request 2 teacher recommendations',       done:false, tag:'Rec' },
        { id:4, text:'Complete university supplemental essays',  done:false, tag:'Essay' },
        { id:5, text:'Finalize college list (10–15 schools)',    done:false, tag:'Planning' },
        { id:6, text:'Register for AP / A-Level / IB exams',    done:false, tag:'Exam' },
        { id:7, text:'Build portfolio project #1',              done:false, tag:'Portfolio' },
      ];

      const AuthCtx = createContext(null);

      function AuthProvider({ children }) {
        const [user, setUser] = useState(() => readJSON(LS_SESSION, null));

        const login = (email, password) => {
          const users = readJSON(LS_USERS, []);
          const found = users.find(u => u.email.toLowerCase() === email.toLowerCase() && u.password === password);
          if (!found) return 'Invalid email or password.';
          const updated = { ...found, lastLogin: Date.now() };
          writeJSON(LS_SESSION, updated);
          const newList = users.map(u => u.id === updated.id ? updated : u);
          writeJSON(LS_USERS, newList);
          setUser(updated);
          return null;
        };

        const signup = (name, email, password) => {
          if (!name.trim() || !email.trim() || !password) return 'All fields are required.';
          if (!/\S+@\S+\.\S+/.test(email)) return 'Please enter a valid email address.';
          if (password.length < 6) return 'Password must be at least 6 characters.';
          const users = readJSON(LS_USERS, []);
          if (users.find(u => u.email.toLowerCase() === email.toLowerCase())) return 'An account with this email already exists.';
          const newUser = { id: Date.now().toString(), name: name.trim(), email: email.trim().toLowerCase(), password, roadmap: null, tasks: DEFAULT_TASKS, streak: 0, streakData: [false,false,false,false,false,false,false], progress: 0, lastLogin: Date.now(), createdAt: Date.now() };
          writeJSON(LS_USERS, [...users, newUser]);
          writeJSON(LS_SESSION, newUser);
          setUser(newUser);
          return null;
        };

        const logout = () => { try { localStorage.removeItem(LS_SESSION); } catch {} setUser(null); };

        const updateUser = useCallback((updates) => {
          setUser(prev => {
            if (!prev) return prev;
            const updated = { ...prev, ...updates };
            writeJSON(LS_SESSION, updated);
            const users = readJSON(LS_USERS, []).map(u => u.id === updated.id ? updated : u);
            writeJSON(LS_USERS, users);
            return updated;
          });
        }, []);

        return React.createElement(AuthCtx.Provider, { value:{ user, login, signup, logout, updateUser } }, children);
      }

      const LangCtx = createContext({ lang:'en', toggle:()=>{}, t:(k)=>T.en[k]||k });

      function LangProvider({ children }) {
        const [lang, setLang] = useState(() => { try { return localStorage.getItem('pp_lang')||'en'; } catch { return 'en'; } });
        const toggle = useCallback(() => setLang(l => { const n=l==='en'?'ru':'en'; try{localStorage.setItem('pp_lang',n);}catch{} return n; }), []);
        const t = useCallback((key) => T[lang]?.[key] ?? T.en?.[key] ?? key, [lang]);
        return React.createElement(LangCtx.Provider, { value:{ lang, toggle, t } }, children);
      }
      const useLang = () => useContext(LangCtx);

      // ── Icons (inline SVG components) ──────────────────────────────────────

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6">

      // ── Navbar ─────────────────────────────────────────────────────────────
      function Navbar({ onCTA, page, setPage, onOpenAuth }) {
        const { user, logout } = useAuth();
        const { lang, toggle, t } = useLang();
        const [scrolled, setScrolled] = useState(false);
        const [mobileOpen, setMobileOpen] = useState(false);

        useEffect(() => {
          const handler = () => setScrolled(window.scrollY > 20);
          window.addEventListener('scroll', handler);
          return () => window.removeEventListener('scroll', handler);
        }, []);

        const navLinks = [
          { id:'home',         label: t('home') },
          { id:'dashboard',    label: t('dashboard') },
          { id:'universities', label: t('universities') },
          { id:'career-test',  label: t('careerTest') },
        ];

        const go = (id) => { setPage(id); setMobileOpen(false); window.scrollTo({top:0,behavior:'smooth'}); };

        const LangToggle = () => (
          <div className="lang-pill">
            <span onClick={() => lang !== 'en' && toggle()} className={`lang-opt ${lang==='en'?'active':''}`}>EN</span>
            <span onClick={() => lang !== 'ru' && toggle()} className={`lang-opt ${lang==='ru'?'active':''}`}>RU</span>
          </div>
        );

        return (
          <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-300 ${scrolled ? 'glass py-2.5' : 'py-4'}`}>
            <div className="max-w-7xl mx-auto px-6 flex items-center justify-between gap-4">
              {/* Logo */}
              <button onClick={() => go('home')} className="flex items-center gap-2 flex-shrink-0">
                <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center">
                  <SparkleIcon />
                </div>
                <span className="text-white font-bold text-lg tracking-tight">PathPilot <span className="text-indigo-400">AI</span></span>
              </button>

              {/* Desktop nav */}
              <div className="hidden md:flex items-center gap-1">
                {navLinks.map(link => (
                  <button key={link.id} onClick={() => go(link.id)}
                    className={`nav-link px-4 py-2 rounded-xl text-sm font-medium transition-colors ${page === link.id ? 'active text-white bg-white/8' : 'text-gray-400 hover:text-white hover:bg-white/5'}`}>
                    {link.label}
                  </button>
                ))}
              </div>

              {/* Right side */}
              <div className="flex items-center gap-2">
                <div className="hidden sm:block"><LangToggle /></div>
                {user ? (
                  <>
                    <button onClick={() => go('dashboard')}
                      className="hidden sm:flex items-center gap-2 glass hover:bg-white/10 text-gray-300 hover:text-white text-sm font-medium px-4 py-2 rounded-xl transition-all">
                      <span className="w-6 h-6 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-xs font-bold text-white">
                        {user.name.charAt(0).toUpperCase()}
                      </span>
                      {user.name.split(' ')[0]}
                    </button>
                    <button onClick={logout}
                      className="text-gray-500 hover:text-white text-sm px-3 py-2 rounded-xl hover:bg-white/5 transition-all btn-active">
                      {t('signout')}
                    </button>
                  </>
                ) : (
                  <>
                    <button onClick={() => onOpenAuth('login')}
                      className="hidden sm:block text-gray-400 hover:text-white text-sm font-medium px-4 py-2 rounded-xl hover:bg-white/5 transition-all">
                      {t('login')}
                    </button>
                    <button onClick={() => onOpenAuth('signup')}
                      className="bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-semibold px-5 py-2.5 rounded-xl transition-all duration-200 hover:shadow-lg hover:shadow-indigo-500/30 btn-active">
                      {t('signup')}
                    </button>
                  </>
                )}
                {/* Mobile hamburger */}
                <button onClick={() => setMobileOpen(o => !o)}
                  className="md:hidden glass w-9 h-9 flex items-center justify-center rounded-xl text-gray-400 hover:text-white transition-all">
                  {mobileOpen
                    ? <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    : <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>}
                </button>
              </div>
            </div>

            {/* Mobile menu */}
            {mobileOpen && (
              <div className="md:hidden glass border-t border-white/5 px-6 py-4 space-y-1">
                {navLinks.map(link => (
                  <button key={link.id} onClick={() => go(link.id)}
                    className={`w-full text-left px-4 py-3 rounded-xl text-sm font-medium transition-all ${page === link.id ? 'text-white bg-indigo-600/30' : 'text-gray-400 hover:text-white hover:bg-white/5'}`}>
                    {link.label}
                  </button>
                ))}
                <div className="flex items-center gap-3 px-4 py-2">
                  <span className="text-gray-600 text-xs">Language</span>
                  <LangToggle />
                </div>
                {!user && (
                  <div className="flex gap-2 pt-2">
                    <button onClick={() => { onOpenAuth('login'); setMobileOpen(false); }} className="flex-1 glass text-gray-300 text-sm font-medium py-2.5 rounded-xl text-center">{t('login')}</button>
                    <button onClick={() => { onOpenAuth('signup'); setMobileOpen(false); }} className="flex-1 bg-indigo-600 text-white text-sm font-bold py-2.5 rounded-xl">{t('signup')}</button>
                  </div>
                )}
                {user && (
                  <button onClick={() => { logout(); setMobileOpen(false); }} className="w-full text-left px-4 py-3 rounded-xl text-sm text-gray-500 hover:text-red-400 transition-all">{t('signout')}</button>
                )}
              </div>
            )}
          </nav>
        );
      }

      // ── Dashboard ──────────────────────────────────────────────────────────
      function Dashboard() {
        const { t, lang } = useLang();
        const DEMO_TASKS_EN = ['Submit SAT / national exam registration','Write Common App personal statement','Request 2 teacher recommendations','Complete MIT supplemental essay','Finalize college list (12 schools)','Register for AP / A-Level exams','Build portfolio project #1'];
        const DEMO_TASKS_RU = ['Подать заявку на регистрацию на SAT','Написать эссе для Common App','Запросить 2 рекомендательных письма','Написать дополнительное эссе MIT','Составить список из 12 университетов','Зарегистрироваться на AP / A-Level','Создать проект для портфолио №1'];
        const taskTexts = lang === 'ru' ? DEMO_TASKS_RU : DEMO_TASKS_EN;
        const [tasks, setTasks] = useState([
          { id:1, done:true,  tag:'Exam' },
          { id:2, done:true,  tag:'Essay' },
          { id:3, done:false, tag:'Rec' },
          { id:4, done:false, tag:'Essay' },
          { id:5, done:false, tag:'Planning' },
          { id:6, done:false, tag:'Exam' },
          { id:7, done:false, tag:'Portfolio' },
        ]);

        const [progress, setProgress] = useState(0);
        const [streakVisible, setStreakVisible] = useState(false);

        useEffect(() => {
          const t1 = setTimeout(() => setProgress(68), 350);
          const t2 = setTimeout(() => setStreakVisible(true), 700);
          return () => { clearTimeout(t1); clearTimeout(t2); };
        }, []);

        const toggle = (id) => setTasks(prev => prev.map(t => t.id === id ? {...t, done:!t.done} : t));
        const doneCount  = tasks.filter(t => t.done).length;
        const donePct    = Math.round((doneCount / tasks.length) * 100);

        const timelineEN = [
          { month:'Apr', label:'Foundation',   items:['SAT Prep starts','Essay outline'],         dot:'bg-indigo-500 shadow-indigo-500/60', active:true  },
          { month:'May', label:'Exam Season',  items:['AP / A-Level Exams','Draft Essay 1'],      dot:'bg-purple-500 shadow-purple-500/60', active:true  },
          { month:'Jun', label:'Explore',      items:['Campus visits','Finalise school list'],    dot:'bg-pink-500',   active:false },
          { month:'Jul', label:'Polish',       items:['Essay revisions','Request recs'],          dot:'bg-orange-500', active:false },
          { month:'Aug', label:'Applications', items:['Common App opens','Activities list'],      dot:'bg-yellow-500', active:false },
          { month:'Sep', label:'Submit',       items:['Submit EA apps','Scholarship search'],     dot:'bg-green-500',  active:false },
        ];
        const timelineRU = [
          { month:'Апр', label:'Фундамент',    items:['Начало подготовки к SAT','Набросок эссе'], dot:'bg-indigo-500 shadow-indigo-500/60', active:true  },
          { month:'Май', label:'Экзамены',     items:['AP / A-Level экзамены','Черновик эссе 1'], dot:'bg-purple-500 shadow-purple-500/60', active:true  },
          { month:'Июн', label:'Изучение',     items:['Посещение кампусов','Финальный список'],   dot:'bg-pink-500',   active:false },
          { month:'Июл', label:'Полировка',    items:['Правки эссе','Запрос рекомендаций'],       dot:'bg-orange-500', active:false },
          { month:'Авг', label:'Заявки',       items:['Common App открывается','Список активностей'], dot:'bg-yellow-500', active:false },
          { month:'Сен', label:'Подача',       items:['Отправка EA заявок','Поиск грантов'],      dot:'bg-green-500',  active:false },
        ];
        const timeline = lang === 'ru' ? timelineRU : timelineEN;

        const tagStyle = {
          Exam:      'text-indigo-300 bg-indigo-500/20 border border-indigo-500/25',
          Essay:     'text-purple-300 bg-purple-500/20 border border-purple-500/25',
          Rec:       'text-pink-300   bg-pink-500/20   border border-pink-500/25',
          Planning:  'text-green-300  bg-green-500/20  border border-green-500/25',
          Portfolio: 'text-blue-300   bg-blue-500/20   border border-blue-500/25',
        };

        const schools = [
          { name:'MIT',                    type:'Reach', fit:91, grad:'from-indigo-500 to-blue-600' },
          { name:'Stanford',               type:'Reach', fit:87, grad:'from-purple-500 to-violet-600' },
          { name:'UC Berkeley',            type:'Match', fit:78, grad:'from-blue-500  to-cyan-600' },
          { name:'University of Michigan', type:'Safety',fit:95, grad:'from-green-500 to-emerald-600' },
        ];

        return (
          <section id="dashboard" className="py-28 relative">
            <div className="absolute inset-0 overflow-hidden pointer-events-none">
              <div className="absolute top-1/4 right-0  w-[500px] h-[500px] bg-purple-600/8  rounded-full blur-3xl" />
              <div className="absolute bottom-1/4 left-0 w-[400px] h-[400px] bg-indigo-600/8 rounded-full blur-3xl" />
              <div className="absolute top-0 left-1/2 -translate-x-1/2 w-[900px] h-px bg-gradient-to-r from-transparent via-white/8 to-transparent" />
            </div>

            <div className="relative z-10 max-w-7xl mx-auto px-6">
              {/* Section header */}
              <div className="text-center mb-16">
                <div className="inline-flex items-center gap-2 glass rounded-full px-4 py-2 mb-4 text-sm text-green-300">
                  <span className="flex h-2 w-2 rounded-full bg-green-400 animate-pulse" /> {t('dashPrevBadge')}
                </div>
                <h2 className="text-4xl md:text-5xl font-black text-white mb-4">
                  {t('dashPrevH2a')}<br /><span className="shimmer-text">{t('dashPrevH2b')}</span>
                </h2>
                <p className="text-gray-400 max-w-xl mx-auto">{t('dashPrevSub')}</p>
              </div>

              {/* ── Top stat row ── */}
              <div className="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-6">
                {[
                  { icon:'📋', label:t('statTasksDone'), value:`${doneCount}/${tasks.length}`, sub:t('dashPrevThisWeek') },
                  { icon:'🔥', label:t('statStreak'),    value:'14',  sub:t('dashPrevBest') },
                  { icon:'📊', label:'GPA (5.0)',         value:'4.6', sub:t('dashPrevCurrentGpa') },
                  { icon:'🎯', label:'Apps Ready',        value:'32%', sub:t('dashPrevCompletion') },
                ].map((s,i) => (
                  <div key={i} className="glass-strong rounded-2xl p-4 card-hover flex items-center gap-3">
                    <span className="text-2xl flex-shrink-0">{s.icon}</span>
                    <div className="min-w-0">
                      <p className="text-white font-black text-lg leading-none">{s.value}</p>
                      <p className="text-gray-400 text-xs mt-0.5 truncate">{s.label}</p>
                    </div>
                  </div>
                ))}
              </div>

              {/* ── Main grid ── */}
              <div className="grid lg:grid-cols-3 gap-6">

                {/* Left — 2 cols */}
                <div className="lg:col-span-2 space-y-6">

                  {/* Progress + Streak */}
                  <div className="grid sm:grid-cols-2 gap-6">

                    {/* Progress ring card */}
                    <div className="glass rounded-3xl p-6 card-hover">
                      <div className="flex items-start justify-between mb-5">
                        <div>
                          <p className="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-1">{t('dashPrevOverallProg')}</p>
                          <p className="text-5xl font-black text-white leading-none">{progress}<span className="text-2xl text-gray-500 font-bold">%</span></p>
                          <p className="text-xs text-gray-500 mt-1">{100-progress}% {t('remaining')}</p>
                        </div>
                        <div className="relative w-20 h-20 flex-shrink-0">
                          <svg className="w-20 h-20 -rotate-90" viewBox="0 0 80 80">
                            <circle cx="40" cy="40" r="34" fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth="7"/>
                            <circle cx="40" cy="40" r="34" fill="none" stroke="url(#progGrad)" strokeWidth="7"
                              strokeDasharray="213.6"
                              strokeDashoffset={`${213.6 * (1 - progress/100)}`}
                              strokeLinecap="round"
                              style={{transition:'stroke-dashoffset 1.6s cubic-bezier(0.4,0,0.2,1)'}}/>
                            <defs>
                              <linearGradient id="progGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%"   stopColor="#6366f1"/>
                                <stop offset="100%" stopColor="#a855f7"/>
                              </linearGradient>
                            </defs>
                          </svg>
                          <div className="absolute inset-0 flex items-center justify-center">
                            <span className="text-xs font-bold text-indigo-300">{progress}%</span>
                          </div>
                        </div>
                      </div>
                      <div className="w-full bg-white/8 rounded-full h-2.5 overflow-hidden">
                        <div className="h-2.5 rounded-full bg-gradient-to-r from-indigo-500 to-purple-500 progress-bar-fill"
                          style={{width:`${progress}%`}}/>
                      </div>
                      <div className="flex justify-between text-xs text-gray-600 mt-1.5">
                        <span>0%</span><span>{t('dashPrevAppSeason')}</span><span>100%</span>
                      </div>
                    </div>

                    {/* Streak card */}
                    <div className={`glass rounded-3xl p-6 card-hover relative overflow-hidden transition-all duration-700 ${streakVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-4'}`}>
                      <div className="absolute -top-6 -right-6 w-32 h-32 bg-orange-500/10 rounded-full blur-2xl pointer-events-none" />
                      <div className="flex items-start justify-between mb-4">
                        <div>
                          <p className="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-1">{t('dashPrevStreak')}</p>
                          <div className="flex items-end gap-2">
                            <span className="text-5xl font-black text-white leading-none">14</span>
                            <span className="text-orange-400 mb-1"><FireIcon /></span>
                          </div>
                        </div>
                        <div className="glass rounded-xl px-2 py-1 text-xs text-orange-300 font-semibold">{t('dashPrevBest2')}</div>
                      </div>
                      {/* Bar chart */}
                      <div className="flex items-end gap-1.5 h-12 mb-3">
                        {[
                          {d:'M', h:65, active:true},
                          {d:'T', h:85, active:true},
                          {d:'W', h:55, active:true},
                          {d:'T', h:95, active:true},
                          {d:'F', h:75, active:true},
                          {d:'S', h:30, active:false},
                          {d:'S', h:20, active:false},
                        ].map((bar,i) => (
                          <div key={i} className="flex-1 flex flex-col items-center gap-1">
                            <div className="w-full rounded-md transition-all duration-700"
                              style={{
                                height:`${bar.h}%`,
                                background: bar.active
                                  ? 'linear-gradient(to top, #f97316, #fbbf24)'
                                  : 'rgba(255,255,255,0.08)',
                                minHeight:'4px',
                              }}/>
                            <span className="text-[10px] text-gray-600">{bar.d}</span>
                          </div>
                        ))}
                      </div>
                      <p className="text-xs text-orange-400 font-semibold">{t('dashPrevChain')}</p>
                    </div>
                  </div>

                  {/* Task Checklist */}
                  <div className="glass rounded-3xl p-6 card-hover">
                    <div className="flex items-center justify-between mb-4">
                      <div>
                        <h3 className="text-white font-bold text-lg">{t('dashPrevTaskTitle')}</h3>
                        <p className="text-gray-500 text-sm mt-0.5">{doneCount} / {tasks.length} {t('dashPrevCompleted')}</p>
                      </div>
                      <div className="flex items-center gap-2">
                        <div className="h-1.5 w-24 bg-white/8 rounded-full overflow-hidden">
                          <div className="h-full rounded-full bg-gradient-to-r from-indigo-500 to-purple-500 transition-all duration-500"
                            style={{width:`${donePct}%`}}/>
                        </div>
                        <span className="text-sm font-bold text-indigo-400 min-w-[36px] text-right">{donePct}%</span>
                      </div>
                    </div>
                    {/* Full progress bar */}
                    <div className="w-full bg-white/8 rounded-full h-2 mb-5 overflow-hidden">
                      <div className="h-full rounded-full bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 transition-all duration-600"
                        style={{width:`${donePct}%`}}/>
                    </div>
                    <div className="space-y-2">
                      {tasks.map((tk, idx) => (
                        <div key={tk.id} onClick={() => toggle(tk.id)}
                          className={`flex items-center gap-3 px-4 py-3 rounded-2xl cursor-pointer transition-all duration-200 group border ${tk.done ? 'bg-white/4 border-white/5' : 'border-transparent hover:bg-white/5 hover:border-white/8'}`}>
                          <div className={`flex-shrink-0 w-5 h-5 rounded-full flex items-center justify-center transition-all duration-200 ${tk.done ? 'bg-gradient-to-br from-indigo-500 to-purple-500' : 'border-2 border-gray-600 group-hover:border-indigo-400'}`}>
                            {tk.done && <svg viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="w-3 h-3"><polyline points="20 6 9 17 4 12"/></svg>}
                          </div>
                          <span className={`flex-1 text-sm transition-all duration-200 ${tk.done ? 'line-through text-gray-500' : 'text-gray-200 group-hover:text-white'}`}>{taskTexts[idx]}</span>
                          <span className={`tag-pill flex-shrink-0 ${tagStyle[tk.tag] || 'text-gray-400 bg-white/8'}`}>{tk.tag}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>

                {/* Right column */}
                <div className="space-y-6">

                  {/* Timeline */}
                  <div className="glass rounded-3xl p-6 card-hover">
                    <h3 className="text-white font-bold text-lg mb-6">{t('dashPrevTimeline')}</h3>
                    <div className="relative">
                      <div className="absolute left-[18px] top-2 bottom-2 w-px bg-gradient-to-b from-indigo-500 via-purple-500/50 to-transparent" />
                      <div className="space-y-5">
                        {timeline.map((m,i) => (
                          <div key={i} className="relative pl-11">
                            <div className={`absolute left-3 top-1.5 w-3.5 h-3.5 rounded-full border-2 border-gray-950 transition-all duration-300 ${m.dot} ${m.active ? 'shadow-lg' : ''}`} />
                            <div className="flex items-center gap-2 mb-1">
                              <span className={`text-xs font-black uppercase tracking-wider ${m.active ? 'text-white' : 'text-gray-600'}`}>{m.month}</span>
                              <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${m.active ? 'text-indigo-300 bg-indigo-500/15' : 'text-gray-600 bg-white/5'}`}>{m.label}</span>
                            </div>
                            {m.items.map((item,j) => (
                              <p key={j} className={`text-xs leading-relaxed ${m.active ? 'text-gray-300' : 'text-gray-600'}`}>· {item}</p>
                            ))}
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>

                  {/* School list */}
                  <div className="glass rounded-3xl p-6 card-hover">
                    <div className="flex items-center justify-between mb-5">
                      <h3 className="text-white font-bold text-lg">{t('dashPrevSchools')}</h3>
                      <span className="text-xs text-gray-500">{t('dashPrevSchoolCount')}</span>
                    </div>
                    <div className="space-y-4">
                      {schools.map((s,i) => (
                        <div key={i} className="group">
                          <div className="flex items-center gap-3 mb-1.5">
                            <div className={`w-8 h-8 rounded-xl bg-gradient-to-br ${s.grad} flex items-center justify-center text-white text-xs font-black flex-shrink-0 group-hover:scale-105 transition-transform`}>
                              {s.name.slice(0,2).toUpperCase()}
                            </div>
                            <span className="text-sm text-white font-medium flex-1 truncate">{s.name}</span>
                            <span className={`tag-pill ${s.type==='Reach'?'text-orange-300 bg-orange-500/20 border-orange-500/25':s.type==='Match'?'text-blue-300 bg-blue-500/20 border-blue-500/25':'text-green-300 bg-green-500/20 border-green-500/25'}`}>
                              {s.type}
                            </span>
                          </div>
                          <div className="flex items-center gap-2 pl-11">
                            <div className="flex-1 bg-white/8 rounded-full h-1.5 overflow-hidden">
                              <div className={`h-full rounded-full bg-gradient-to-r ${s.grad} transition-all duration-1000`} style={{width:`${s.fit}%`}}/>
                            </div>
                            <span className="text-xs text-gray-500 w-8 text-right">{s.fit}%</span>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </section>
        );
      }

      // ── Why Students Love PathPilot ────────────────────────────────────────
      function WhyStudentsLove({ onCTA }) {
        const { t } = useLang();
        const benefits = [
          { icon:'🗺️', gradient:'from-indigo-500/15 to-blue-500/15', border:'border-indigo-500/25',

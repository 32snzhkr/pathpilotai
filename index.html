          academicGoals: ['Achieve top scores in Biology & Chemistry', 'Complete AP Biology and AP Chemistry', 'Shadow a doctor (min 50 hours)', 'Prepare for MCAT fundamentals early'],
          extracurriculars: ['Hospital or clinic volunteering', 'Science Olympiad (biology events)', 'Red Cross / health NGO volunteering', 'Lead a health awareness campaign at school'],
        },
        'Business / Economics': {
          color: 'yellow',
          projects: [
            { title: 'Micro-Business Venture', desc: 'Launch a real small business (online store, service, or product). Document revenue and lessons.', difficulty: 'Beginner' },
            { title: 'Market Research Report', desc: 'Conduct a 10-page industry analysis for a company or sector you find interesting.', difficulty: 'Intermediate' },
            { title: 'Startup Pitch Deck', desc: 'Build a full investor-ready pitch deck for an original business idea and present it.', difficulty: 'Advanced' },
          ],
          academicGoals: ['Master microeconomics & macroeconomics fundamentals', 'Score 700+ in SAT Evidence-Based Reading', 'Study basic accounting and financial literacy', 'Learn Excel / Google Sheets modeling'],
          extracurriculars: ['DECA or BPA competitions', 'Start a school entrepreneurship club', 'Junior Achievement or Young Entrepreneurs programs', 'Invest in paper trading / stock simulations'],
        },
        'Engineering': {
          color: 'orange',
          projects: [
            { title: 'Arduino / Raspberry Pi Project', desc: 'Build a hardware project like a weather station, smart home device, or robotics arm.', difficulty: 'Beginner' },
            { title: 'CAD Design Portfolio', desc: 'Design 5+ 3D models using Fusion 360 or SolidWorks. Document the engineering process.', difficulty: 'Intermediate' },
            { title: 'Science Fair Research Project', desc: 'Conduct an original experiment in physics, chemistry, or materials science for competition.', difficulty: 'Advanced' },
          ],
          academicGoals: ['Excel in Physics and advanced Math (Calculus)', 'Score 780+ in SAT Math', 'Complete AP Physics and AP Calculus', 'Learn CAD tools (AutoCAD or Fusion 360)'],
          extracurriculars: ['FIRST Robotics Competition (FRC)', 'Science Olympiad (engineering events)', 'Math Olympiad (AMC/AIME)', 'Volunteer to tutor physics or math'],
        },
        'Law / Political Science': {
          color: 'blue',
          projects: [
            { title: 'Opinion Editorial Column', desc: 'Write monthly op-eds on policy or legal issues for your school paper or a local publication.', difficulty: 'Beginner' },
            { title: 'Model United Nations Leadership', desc: 'Lead MUN conferences as Secretary General or chair panels on international law.', difficulty: 'Intermediate' },
            { title: 'Constitutional Law Essay', desc: 'Submit a legal essay to the American Bar Association or similar youth law competition.', difficulty: 'Advanced' },
          ],
          academicGoals: ['Master essay writing and argumentation', 'Score 750+ in SAT Critical Reading', 'Study AP Government / AP US History', 'Read landmark Supreme Court cases'],
          extracurriculars: ['Debate team (state-level competitions)', 'Model United Nations (MUN)', 'Intern at a local law office or city council', 'Youth legislature or mock trial'],
        },
        'Arts / Design': {
          color: 'purple',
          projects: [
            { title: 'Design Portfolio (20 pieces)', desc: 'Curate a diverse portfolio with branding, typography, and UI work. Use Figma or Adobe Suite.', difficulty: 'Beginner' },
            { title: 'Brand Identity Project', desc: 'Design a complete brand for a fictional or real local business: logo, color system, mockups.', difficulty: 'Intermediate' },
            { title: 'Social Impact Design Campaign', desc: 'Create a design campaign addressing a real social issue. Submit to design competitions.', difficulty: 'Advanced' },
          ],
          academicGoals: ['Develop technical skills in Adobe CC or Figma', 'Study art history and design theory', 'Maintain a daily creative sketchbook', 'Complete AP Art or AP Studio Art'],
          extracurriculars: ['Submit to YoungArts or Scholastic Art Awards', 'Design posters/branding for school clubs', 'Attend summer design or art intensives', 'Freelance small design projects'],
        },
      };

      const COUNTRY_DATA = {
        'USA': {
          exams: ['SAT (target 1400+)', 'ACT (target 32+)', 'AP exams (aim for 4-5)', 'TOEFL 100+ or IELTS 7.0+'],
          timeline: ['Aug–Oct: Common App opens, essays due', 'Nov 1: Early Action/Decision deadlines', 'Jan 1: Regular Decision deadline', 'Mar–Apr: Decisions released'],
          tips: 'Focus heavily on extracurricular depth and leadership. Quality over quantity. Demonstrated interest matters.',
        },
        'UK': {
          exams: ['UCAS application (5 choices)', 'A-Levels or IB Diploma', 'IELTS 7.0+ (most universities)', 'UKCAT/BMAT for Medicine/Dentistry'],
          timeline: ['Sep–Oct: UCAS opens, write personal statement', 'Oct 15: Oxbridge/Medicine deadline', 'Jan 15: Main UCAS deadline', 'May–Jun: Firm & Insurance choices'],
          tips: 'Personal statement is critical — one essay for all 5 universities. Show intellectual curiosity and subject passion.',
        },
        'Canada': {
          exams: ['SAT/ACT (optional at many schools)', 'Provincial exams (varies by province)', 'IELTS 6.5+ / TOEFL 90+', 'Strong GPA is primary factor'],
          timeline: ['Oct–Nov: Applications open', 'Jan–Feb: Most deadlines', 'Mar–Apr: Admission offers', 'May 1–Jun 1: Accept offers'],
          tips: 'GPA is the most important factor at Canadian universities. Community involvement and awards help differentiation.',
        },
        'Germany': {
          exams: ['TestDaF or DSH (German proficiency)', 'IELTS 6.0+ for English-taught programs', 'Uni-Assist application platform', 'Numerus Clausus (NC) GPA threshold'],
          timeline: ['Jan 15: Winter semester applications', 'Jul 15: Summer semester applications', 'Oct/Apr: Semesters start', 'Blocked account: €11,208/year proof'],
          tips: 'Most public universities are tuition-free. Blocked bank account and language certificate are mandatory for visa.',
        },
        'Australia': {
          exams: ['IELTS 6.5–7.0+ / TOEFL 79–94+', 'ATAR or equivalent score', 'UAC / VTAC / QTAC applications', 'Some programs need GAMSAT/UCAT'],
          timeline: ['Aug–Sep: Applications open', 'Sep–Nov: Main application period', 'Dec–Jan: Offers released', 'Feb/Jul: Semester start dates'],
          tips: 'Strong ATAR and English scores drive admission. Student visa requires financial proof (~AU$21,041/year).',
        },
        'Other': {
          exams: ['IELTS 6.5+ or TOEFL 90+', 'Country-specific standardized tests', 'Transcripts with certified translations', 'Letters of recommendation (2–3)'],
          timeline: ['Research each school\'s deadlines', '12–18 months ahead: start applications', 'Check scholarship deadlines (often earlier)', 'Apply for student visa 3–6 months before'],
          tips: 'Research each country\'s specific requirements. Start early, especially for visa and financial proof documentation.',
        },
      };

      const ENGLISH_TASKS = {
        'Beginner': [
          'Join an English-speaking online community (Reddit, Discord)',
          'Watch 1 English YouTube video/day with subtitles',
          'Learn 10 new academic vocabulary words per week',
          'Complete Duolingo English daily (30 min)',
          'Start a simple English journal (3 sentences/day)',
        ],
        'Intermediate': [
          'Read one English news article daily (BBC, Reuters)',
          'Practice IELTS Academic writing Task 1 & 2 weekly',
          'Join Toastmasters or English speaking club',
          'Listen to English podcasts during commute',
          'Write 1 essay per week and get feedback',
        ],
        'Advanced': [
          'Take IELTS or TOEFL mock tests monthly',
          'Read academic papers in your intended major',
          'Record yourself speaking and review for fluency',
          'Practice IELTS Speaking Part 3 (abstract questions)',
          'Write university-style essays with thesis arguments',
        ],
      };

      function generateRoadmap(f) {
        const majorKey = Object.keys(MAJOR_DATA).find(k => k.toLowerCase().includes(f.major.toLowerCase())) || 'Computer Science';
        const countryKey = Object.keys(COUNTRY_DATA).find(k => k.toLowerCase().includes(f.country.toLowerCase())) || 'Other';
        const englishKey = ['Beginner','Intermediate','Advanced'].includes(f.englishLevel) ? f.englishLevel : 'Intermediate';
        const major = MAJOR_DATA[majorKey];
        const country = COUNTRY_DATA[countryKey];
        const months = parseInt(f.timeline) || 12;
        const gpa = parseFloat(f.gpa) || 3.5;
        const gpaNote = gpa < 3.0
          ? 'GPA needs urgent attention (below 3.0/5.0) — focus on academic recovery before anything else.'
          : gpa < 3.5
            ? 'GPA is developing (3.0–3.4/5.0) — target consistent improvement and highlight upward trend.'
            : gpa < 4.0
              ? 'Solid GPA (3.5–3.9/5.0) — maintain momentum and strengthen standardized test scores.'
              : gpa < 4.5
                ? 'Strong GPA (4.0–4.4/5.0) — leverage this in applications and aim for selective programs.'
                : 'Excellent GPA (4.5+/5.0) — you are highly competitive; apply to top-tier programs with confidence.';

        // Build month-by-month timeline
        const phases = [];
        if (months <= 6) {
          phases.push({ range: 'Month 1–2', label: 'Foundation', color: 'indigo', tasks: ['Audit current grades and identify weak subjects', 'Set up study schedule (2h focused study/day)', country.exams[0] + ' — register and begin prep', 'Start English improvement plan'] });
          phases.push({ range: 'Month 3–4', label: 'Build', color: 'purple', tasks: ['Begin Portfolio Project #1: ' + major.projects[0].title, 'Join 1 extracurricular from your list', 'Draft your personal statement outline', 'First mock exam — assess gaps'] });
          phases.push({ range: 'Month 5–6', label: 'Launch', color: 'pink', tasks: ['Finalize and submit applications', 'Complete Portfolio Project #2', 'Request letters of recommendation', country.timeline[0]] });
        } else if (months <= 9) {
          phases.push({ range: 'Month 1–3', label: 'Foundation', color: 'indigo', tasks: ['Deep-dive into academic weak spots', 'Register for ' + country.exams[0], 'Start English level-up plan', 'Research target universities in ' + (f.country || 'your target country')] });
          phases.push({ range: 'Month 4–6', label: 'Build Skills', color: 'purple', tasks: ['Launch Portfolio Project #1: ' + major.projects[0].title, 'Join 2 extracurriculars', 'Take first practice exam', 'Write essay draft #1'] });
          phases.push({ range: 'Month 7–9', label: 'Apply & Submit', color: 'pink', tasks: ['Complete all application essays', country.timeline[0], 'Request recommendations', 'Finalize college list'] });
        } else {
          phases.push({ range: 'Month 1–3', label: 'Discovery & Foundation', color: 'indigo', tasks: ['Self-assessment: subjects, strengths, goals', 'Create daily study routine', 'Register for standardized tests: ' + country.exams[0], 'Begin English plan: ' + ENGLISH_TASKS[englishKey][0]] });
          phases.push({ range: 'Month 4–6', label: 'Skill Building', color: 'purple', tasks: ['Launch Portfolio Project #1: ' + major.projects[0].title, 'Join extracurricular #1 from your list', 'Take practice/mock exam — review gaps', 'Essay brainstorming sessions (5 story ideas)'] });
          phases.push({ range: 'Month 7–9', label: 'Momentum', color: 'blue', tasks: ['Start Portfolio Project #2: ' + major.projects[1].title, 'Apply for summer programs or competitions', 'Essay draft #1 complete + get feedback', 'Request teacher recommendations early'] });
          phases.push({ range: 'Month 10–12', label: 'Application Season', color: 'green', tasks: ['Finalize all application essays', country.timeline[0] || 'Submit applications on time', 'Complete scholarship applications', 'Celebrate milestones — track your streak!'] });
        }

        // Weekly tasks
        const weeklyTasks = [
          { week: 'Week 1–2', tasks: ['Set up study schedule and environment', 'Register for ' + country.exams[0], 'Identify top 3 academic improvement areas', 'Create your PathPilot dashboard habit'] },
          { week: 'Week 3–4', tasks: ['Complete 2 practice tests', ENGLISH_TASKS[englishKey][0], 'Research 5 universities in ' + (f.country || 'target country'), 'Outline your personal statement'] },
          { week: 'Week 5–8', tasks: ['Start Portfolio Project: ' + major.projects[0].title, 'Join one extracurricular activity', 'Write essay draft #1 (600 words)', 'Contact potential recommendation writers'] },
          { week: 'Week 9–12', tasks: ['Review and revise essay with a mentor', 'Complete at least 4 full mock exams', 'Polish Portfolio Project #1', 'Start building your activities list for applications'] },
        ];

        return {
          name: f.name,
          major: majorKey,
          country: countryKey,
          englishLevel: englishKey,
          gpa,
          gpaNote,
          timeline: months,
          academicGoals: [...major.academicGoals, gpaNote],
          englishGoals: ENGLISH_TASKS[englishKey],
          projects: major.projects,
          extracurriculars: major.extracurriculars,
          countryExams: country.exams,
          countryTips: country.tips,
          phases,
          weeklyTasks,
          color: major.color,
        };
      }

      // ── Roadmap Display ────────────────────────────────────────────────────
      function RoadmapDisplay({ roadmap, onRegenerate }) {
        const { t } = useLang();
        const [taskState, setTaskState] = useState(() => {
          const init = {};
          roadmap.phases.forEach((p,pi) => p.tasks.forEach((_,ti) => { init[`p${pi}-${ti}`] = false; }));
          roadmap.weeklyTasks.forEach((w,wi) => w.tasks.forEach((_,ti) => { init[`w${wi}-${ti}`] = false; }));
          roadmap.academicGoals.forEach((_,i) => { init[`ag-${i}`] = false; });
          roadmap.englishGoals.forEach((_,i) => { init[`eg-${i}`] = false; });
          roadmap.extracurriculars.forEach((_,i) => { init[`ex-${i}`] = false; });
          return init;
        });

        const toggle = (key) => setTaskState(s => ({...s, [key]: !s[key]}));
        const total = Object.keys(taskState).length;
        const done = Object.values(taskState).filter(Boolean).length;
        const pct = Math.round((done / total) * 100);

        const colorMap = { indigo:'from-indigo-500 to-blue-500', purple:'from-purple-500 to-pink-500', blue:'from-blue-500 to-cyan-500', green:'from-green-500 to-emerald-500', pink:'from-pink-500 to-rose-500', yellow:'from-yellow-500 to-orange-500', orange:'from-orange-500 to-red-500' };
        const phaseColors = ['indigo','purple','blue','green'];
        const diffColor = { Beginner:'text-green-300 bg-green-500/20', Intermediate:'text-yellow-300 bg-yellow-500/20', Advanced:'text-red-300 bg-red-500/20' };

        const SectionHeader = ({ emoji, title, badge }) => (
          <div className="flex items-center gap-3 mb-6">
            <span className="text-2xl">{emoji}</span>
            <h3 className="text-xl font-bold text-white">{title}</h3>
            {badge && <span className="ml-auto text-xs font-semibold text-indigo-300 glass rounded-full px-3 py-1">{badge}</span>}
          </div>
        );

        const TaskItem = ({ label, id, tag, tagColor }) => (
          <div onClick={() => toggle(id)} className={`flex items-start gap-3 p-3 rounded-xl cursor-pointer transition-all duration-200 group ${taskState[id] ? 'bg-white/5' : 'hover:bg-white/5'}`}>
            <div className={`mt-0.5 flex-shrink-0 w-5 h-5 rounded-full flex items-center justify-center transition-all duration-200 ${taskState[id] ? 'bg-gradient-to-br from-indigo-500 to-purple-500 text-white' : 'border-2 border-gray-600 group-hover:border-indigo-400'}`}>
              {taskState[id] && <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="w-3 h-3"><polyline points="20 6 9 17 4 12"/></svg>}
            </div>
            <span className={`flex-1 text-sm leading-relaxed transition-all duration-200 ${taskState[id] ? 'line-through text-gray-500' : 'text-gray-200'}`}>{label}</span>
            {tag && <span className={`flex-shrink-0 text-xs px-2 py-0.5 rounded-full font-medium ${tagColor || 'text-gray-400 bg-white/10'}`}>{tag}</span>}
          </div>
        );

        return (
          <section id="my-roadmap" className="py-16 relative">
            <div className="absolute inset-0 overflow-hidden pointer-events-none">
              <div className="absolute top-0 left-1/3 w-96 h-96 bg-indigo-600/10 rounded-full blur-3xl" />
              <div className="absolute bottom-0 right-1/3 w-80 h-80 bg-purple-600/10 rounded-full blur-3xl" />
            </div>
            <div className="relative z-10 max-w-7xl mx-auto px-6">

              {/* Header */}
              <div className="flex flex-col md:flex-row items-start md:items-center justify-between mb-12 gap-4">
                <div>
                  <div className="inline-flex items-center gap-2 glass rounded-full px-4 py-2 mb-3 text-sm text-green-300">
                    <span className="flex h-2 w-2 rounded-full bg-green-400 animate-pulse" /> {t('rmBadge')}
                  </div>
                  <h2 className="text-4xl font-black text-white">{roadmap.name}'s <span className="shimmer-text">{t('rmRoadmapPlan')}</span></h2>
                  <p className="text-gray-400 mt-2">{roadmap.major} · {roadmap.country} · {roadmap.timeline}-month plan</p>
                </div>
                <button onClick={onRegenerate} className="glass hover:bg-white/10 text-gray-300 hover:text-white text-sm font-semibold px-5 py-2.5 rounded-xl transition-all duration-200 flex items-center gap-2">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/></svg>
                  {t('rmRegen')}
                </button>
              </div>

              {/* Progress Overview */}
              <div className="glass rounded-3xl p-8 mb-8 card-hover">
                <div className="flex flex-col md:flex-row items-start md:items-center gap-6">
                  <div className="flex-1">
                    <div className="flex items-center justify-between mb-3">
                      <span className="text-white font-bold text-lg">{t('rmOverall')}</span>
                      <span className="text-3xl font-black text-white">{pct}%</span>
                    </div>
                    <div className="w-full bg-white/10 rounded-full h-3 mb-3">
                      <div className={`h-3 rounded-full bg-gradient-to-r ${colorMap[roadmap.color] || colorMap.indigo} progress-bar-fill transition-all duration-700`} style={{width:`${pct}%`}} />
                    </div>
                    <p className="text-gray-400 text-sm">{done} / {total} {t('rmTasksDone')} · {total - done} {t('rmTasksLeft')}</p>
                  </div>
                  <div className="flex gap-4 flex-wrap">
                    {[
                      {label:'Major', value: roadmap.major, icon:'🎓'},
                      {label:'Country', value: roadmap.country, icon:'🌍'},
                      {label:'GPA', value: roadmap.gpa.toFixed(1) + ' / 5.0', icon:'📊'},
                      {label:'English', value: roadmap.englishLevel, icon:'💬'},
                    ].map((s,i) => (
                      <div key={i} className="glass rounded-2xl px-4 py-3 text-center min-w-[90px]">
                        <div className="text-xl mb-1">{s.icon}</div>
                        <div className="text-white font-bold text-sm">{s.value}</div>
                        <div className="text-gray-500 text-xs">{s.label}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>

              {/* Main Grid */}
              <div className="grid lg:grid-cols-2 gap-6 mb-6">

                {/* Academic Goals */}
                <div className="glass rounded-3xl p-6 card-hover">
                  <SectionHeader emoji="📚" title={t('rmAcadGoals')} badge={`${roadmap.academicGoals.length} goals`} />
                  <div className="space-y-1">
                    {roadmap.academicGoals.map((g,i) => (
                      <TaskItem key={i} label={g} id={`ag-${i}`} tag={i === roadmap.academicGoals.length - 1 ? 'GPA Note' : null} tagColor="text-blue-300 bg-blue-500/20" />
                    ))}
                  </div>
                  <div className="mt-4 pt-4 border-t border-white/5">
                    <p className="text-xs text-gray-500 font-medium">Exams for {roadmap.country}:</p>
                    <div className="flex flex-wrap gap-2 mt-2">
                      {roadmap.countryExams.map((e,i) => (
                        <span key={i} className="text-xs text-indigo-300 bg-indigo-500/15 border border-indigo-500/20 rounded-full px-3 py-1">{e}</span>
                      ))}
                    </div>
                  </div>
                </div>

                {/* English Goals */}
                <div className="glass rounded-3xl p-6 card-hover">
                  <SectionHeader emoji="💬" title={t('rmEnglish')} badge={roadmap.englishLevel} />
                  <div className="space-y-1">
                    {roadmap.englishGoals.map((g,i) => (
                      <TaskItem key={i} label={g} id={`eg-${i}`} />
                    ))}
                  </div>
                  <div className="mt-4 pt-4 border-t border-white/5 text-xs text-gray-400 leading-relaxed">
                    <span className="text-yellow-400 font-semibold">Pro tip: </span>{roadmap.countryTips}
                  </div>
                </div>
              </div>

              {/* Portfolio Projects */}
              <div className="glass rounded-3xl p-6 mb-6 card-hover">
                <SectionHeader emoji="🛠️" title={t('rmProjects')} badge="Tailored to your major" />
                <div className="grid md:grid-cols-3 gap-4">
                  {roadmap.projects.map((p,i) => (
                    <div key={i} className={`relative rounded-2xl p-5 border border-white/10 bg-gradient-to-br ${colorMap[roadmap.color] || colorMap.indigo} bg-opacity-5 hover:bg-opacity-10 transition-all duration-200 group`}>
                      <div className="flex items-center justify-between mb-3">
                        <span className="text-xs font-bold text-white/60 uppercase tracking-wider">Project {i+1}</span>
                        <span className={`text-xs font-medium px-2 py-0.5 rounded-full ${diffColor[p.difficulty]}`}>{p.difficulty}</span>
                      </div>
                      <h4 className="text-white font-bold mb-2 leading-tight">{p.title}</h4>
                      <p className="text-gray-400 text-sm leading-relaxed">{p.desc}</p>
                    </div>
                  ))}
                </div>
              </div>

              {/* Extracurriculars */}
              <div className="glass rounded-3xl p-6 mb-6 card-hover">
                <SectionHeader emoji="🏆" title={t('rmExtracurr')} badge="4 activities" />
                <div className="grid sm:grid-cols-2 gap-1">
                  {roadmap.extracurriculars.map((e,i) => (
                    <TaskItem key={i} label={e} id={`ex-${i}`} />
                  ))}
                </div>
              </div>

              {/* Timeline */}
              <div className="glass rounded-3xl p-6 mb-6 card-hover">
                <SectionHeader emoji="📅" title={t('rmTimeline')} badge={`${roadmap.timeline} months`} />
                <div className={`grid gap-4 ${roadmap.phases.length === 3 ? 'md:grid-cols-3' : 'md:grid-cols-4'}`}>
                  {roadmap.phases.map((phase, pi) => {
                    const phaseColor = colorMap[phaseColors[pi % phaseColors.length]];
                    const phaseDone = phase.tasks.filter((_,ti) => taskState[`p${pi}-${ti}`]).length;
                    return (
                      <div key={pi} className="relative rounded-2xl p-5 border border-white/10 bg-white/3">
                        <div className={`inline-block text-xs font-bold px-3 py-1 rounded-full bg-gradient-to-r ${phaseColor} text-white mb-3`}>{phase.range}</div>
                        <div className="text-white font-semibold mb-3">{phase.label}</div>
                        <div className="w-full bg-white/10 rounded-full h-1 mb-3">
                          <div className={`h-1 rounded-full bg-gradient-to-r ${phaseColor} transition-all duration-500`} style={{width:`${(phaseDone/phase.tasks.length)*100}%`}} />
                        </div>
                        <div className="space-y-1">
                          {phase.tasks.map((task, ti) => (
                            <div key={ti} onClick={() => toggle(`p${pi}-${ti}`)} className={`flex items-start gap-2 text-sm cursor-pointer p-1.5 rounded-lg hover:bg-white/5 transition-all group`}>
                              <div className={`mt-0.5 flex-shrink-0 w-4 h-4 rounded-full flex items-center justify-center border transition-all ${taskState[`p${pi}-${ti}`] ? `bg-gradient-to-br ${phaseColor} border-transparent` : 'border-gray-600 group-hover:border-indigo-400'}`}>
                                {taskState[`p${pi}-${ti}`] && <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="w-2.5 h-2.5 text-white"><polyline points="20 6 9 17 4 12"/></svg>}
                              </div>
                              <span className={`leading-snug ${taskState[`p${pi}-${ti}`] ? 'line-through text-gray-500' : 'text-gray-300'}`}>{task}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* Weekly Tasks */}
              <div className="glass rounded-3xl p-6 card-hover">
                <SectionHeader emoji="📋" title={t('rmWeeklyTasks')} badge={t('rmWeeklyBadge')} />
                <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-4">
                  {roadmap.weeklyTasks.map((wk, wi) => (
                    <div key={wi} className="rounded-2xl p-4 bg-white/3 border border-white/10">
                      <div className="text-xs font-bold text-purple-400 uppercase tracking-wider mb-3">{wk.week}</div>
                      <div className="space-y-1">
                        {wk.tasks.map((task, ti) => (
                          <TaskItem key={ti} label={task} id={`w${wi}-${ti}`} />
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              </div>

            </div>
          </section>
        );
      }

      // ── Demo Modal ─────────────────────────────────────────────────────────
      const DEMO_STUDENT = {
        name:'Sophia Chen', age:'17', grade:'Grade 11', country:'USA',
        major:'Computer Science', gpa:'4.6', englishLevel:'Advanced', timeline:'12', skills:'Python, Figma, Math',
      };
      const DEMO_ROADMAP = generateRoadmap ? null : null; // resolved lazily after generateRoadmap is defined

      function DemoModal({ onClose, onCTA }) {
        const { t } = useLang();
        const [slide, setSlide] = useState(0);
        const [genStep, setGenStep] = useState(-1);
        const [visible, setVisible] = useState(true);
        const [typed, setTyped] = useState(0); // how many profile rows are "typed in"
        const totalSlides = 3;
        const roadmap = generateRoadmap(DEMO_STUDENT);

        const closeModal = () => {
          setVisible(false);
          setTimeout(onClose, 260);
        };

        // Auto-type the profile rows on slide 0
        useEffect(() => {
          if (slide !== 0) return;
          setTyped(0);
          const profileRows = Object.keys(DEMO_STUDENT).length;
          let i = 0;
          const iv = setInterval(() => {
            i++;
            setTyped(i);
            if (i >= profileRows) clearInterval(iv);
          }, 180);
          return () => clearInterval(iv);
        }, [slide]);

        // Auto-run generation steps on slide 1
        useEffect(() => {
          if (slide !== 1) return;
          setGenStep(-1);
          let i = -1;
          const iv = setInterval(() => {
            i++;
            setGenStep(i);
            if (i >= 4) { clearInterval(iv); setTimeout(() => setSlide(2), 600); }
          }, 520);
          return () => clearInterval(iv);
        }, [slide]);

        const profileRows = [
          {label:'Name',    value:DEMO_STUDENT.name,         icon:'👤'},
          {label:'Age',     value:DEMO_STUDENT.age,          icon:'🎂'},
          {label:'Grade',   value:DEMO_STUDENT.grade,        icon:'🏫'},
          {label:'Country', value:DEMO_STUDENT.country,      icon:'🌍'},
          {label:'Major',   value:DEMO_STUDENT.major,        icon:'💻'},
          {label:'GPA',     value:DEMO_STUDENT.gpa + ' / 5.0', icon:'📊'},
          {label:'English', value:DEMO_STUDENT.englishLevel, icon:'💬'},
          {label:'Timeline',value:DEMO_STUDENT.timeline + ' months', icon:'📅'},
        ];

        const genLabels = [
          'Analyzing academic profile…',
          'Mapping USA university requirements…',
          'Building Computer Science project ideas…',
          'Generating month-by-month timeline…',
          'Creating weekly action tasks…',
        ];

        const overlayBg = visible ? 'opacity-100' : 'opacity-0';
        const cardAnim  = visible ? 'modal-enter' : 'modal-exit';

        return (
          <div className={`fixed inset-0 z-50 flex items-center justify-center p-4 transition-opacity duration-300 ${overlayBg}`}>
            <div className="absolute inset-0 bg-black/75 backdrop-blur-md" onClick={closeModal} />
            <div className={`relative w-full max-w-2xl max-h-[92vh] flex flex-col ${cardAnim}`}
              style={{background:'linear-gradient(135deg,rgba(17,17,40,.98) 0%,rgba(10,10,30,.98) 100%)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:'28px'}}>

              {/* Header bar */}
              <div className="flex items-center justify-between px-7 pt-6 pb-4 border-b border-white/5 flex-shrink-0">
                <div className="flex items-center gap-3">
                  <div className="w-8 h-8 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center">
                    <SparkleIcon />
                  </div>
                  <div>
                    <p className="text-white font-bold text-sm">PathPilot AI — Live Demo</p>
                    <p className="text-gray-500 text-xs">See how your roadmap gets built</p>
                  </div>
                </div>
                {/* Slide dots */}
                <div className="hidden sm:flex items-center gap-4">
                  {['Profile','Generating','Roadmap'].map((label,i) => (
                    <button key={i} onClick={() => i < slide && setSlide(i)}
                      className={`flex items-center gap-1.5 text-xs font-medium transition-all ${i === slide ? 'text-indigo-400' : i < slide ? 'text-gray-400 cursor-pointer hover:text-white' : 'text-gray-700 cursor-default'}`}>
                      <span className={`w-5 h-5 rounded-full flex items-center justify-center text-xs border transition-all ${i === slide ? 'bg-indigo-600 border-indigo-500 text-white' : i < slide ? 'bg-green-600/40 border-green-500/50 text-green-400' : 'border-gray-700 text-gray-700'}`}>
                        {i < slide ? '✓' : i+1}
                      </span>
                      {label}
                    </button>
                  ))}
                </div>
                <button onClick={closeModal}
                  className="w-9 h-9 flex items-center justify-center rounded-xl text-gray-400 hover:text-white hover:bg-white/10 transition-all text-lg ml-4">✕</button>
              </div>

              {/* Slide content — scrollable */}
              <div className="flex-1 overflow-y-auto px-7 py-6">

                {/* ── Slide 0: Profile ── */}
                {slide === 0 && (
                  <div className="demo-slide">
                    <div className="flex items-center gap-3 mb-5">
                      <div className="w-12 h-12 rounded-2xl bg-gradient-to-br from-pink-500 to-indigo-600 flex items-center justify-center text-white text-lg font-black">SC</div>
                      <div>
                        <h3 className="text-white font-bold text-lg">{DEMO_STUDENT.name}</h3>
                        <p className="text-gray-400 text-sm">Sample student profile</p>
                      </div>
                      <span className="ml-auto text-xs text-green-400 bg-green-500/15 border border-green-500/25 rounded-full px-3 py-1 font-medium">Demo</span>
                    </div>
                    <div className="grid grid-cols-2 gap-3 mb-6">
                      {profileRows.map((row,i) => (
                        <div key={i} className={`flex items-center gap-3 glass rounded-2xl p-3.5 transition-all duration-300 ${i < typed ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-2'}`}
                          style={{transitionDelay:`${i*80}ms`}}>
                          <span className="text-xl">{row.icon}</span>
                          <div>
                            <p className="text-gray-500 text-xs mb-0.5">{row.label}</p>
                            <p className="text-white text-sm font-semibold">{row.value}</p>
                          </div>
                        </div>
                      ))}
                    </div>
                    <p className="text-gray-400 text-sm text-center mb-2">This is what PathPilot AI reads from your form. Click below to watch the roadmap generate.</p>
                  </div>
                )}

                {/* ── Slide 1: Generating ── */}
                {slide === 1 && (
                  <div className="demo-slide flex flex-col items-center py-4">
                    <div className="relative w-20 h-20 mb-6">
                      <div className="absolute inset-0 rounded-full ring-spin" style={{border:'3px solid transparent',borderTopColor:'#6366f1',borderRightColor:'#a855f7'}} />
                      <div className="absolute inset-2 rounded-full bg-gradient-to-br from-indigo-600 to-purple-600 flex items-center justify-center">
                        <SparkleIcon />
                      </div>
                    </div>
                    <h3 className="text-white font-bold text-xl mb-1">AI is building the roadmap…</h3>
                    <p className="text-gray-400 text-sm mb-8">Personalizing every section for Sophia</p>
                    <div className="w-full max-w-sm space-y-3">
                      {genLabels.map((label,i) => (
                        <div key={i} className={`flex items-center gap-3 p-3.5 rounded-2xl border transition-all duration-400 ${genStep >= i ? 'border-white/10 bg-white/5' : 'border-transparent opacity-30'}`}>
                          <div className={`w-7 h-7 rounded-full flex items-center justify-center flex-shrink-0 transition-all duration-300 ${genStep > i ? 'bg-gradient-to-br from-green-500 to-emerald-500' : genStep === i ? 'bg-indigo-600 glow-pulse' : 'bg-white/10'}`}>
                            {genStep > i
                              ? <svg viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="w-3.5 h-3.5"><polyline points="20 6 9 17 4 12"/></svg>
                              : genStep === i
                                ? <span className="w-2.5 h-2.5 rounded-full bg-white animate-pulse" />
                                : <span className="text-gray-600 text-xs font-bold">{i+1}</span>}
                          </div>
                          <span className={`text-sm font-medium ${genStep >= i ? 'text-gray-200' : 'text-gray-600'}`}>{label}</span>
                          {genStep > i && <span className="ml-auto text-green-400 text-xs">✓</span>}
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* ── Slide 2: Results preview ── */}
                {slide === 2 && (
                  <div className="demo-slide space-y-4">
                    <div className="flex items-center gap-3 mb-2">
                      <div className="w-8 h-8 rounded-full bg-gradient-to-br from-green-500 to-emerald-500 flex items-center justify-center check-pop">
                        <svg viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4"><polyline points="20 6 9 17 4 12"/></svg>
                      </div>
                      <div>
                        <h3 className="text-white font-bold">Sophia's 12-Month Roadmap</h3>
                        <p className="text-gray-400 text-xs">Computer Science · USA · Advanced English</p>
                      </div>
                      <span className="ml-auto text-indigo-400 text-sm font-bold">0% done</span>
                    </div>

                    {/* Academic Goals */}
                    <div className="glass rounded-2xl p-5">
                      <p className="text-xs font-bold text-indigo-400 uppercase tracking-wider mb-3">📚 {t('rmAcadGoals')}</p>
                      <div className="space-y-2">
                        {roadmap.academicGoals.slice(0,3).map((g,i) => (
                          <div key={i} className="flex items-center gap-2 text-sm text-gray-300">
                            <span className="w-1.5 h-1.5 rounded-full bg-indigo-400 flex-shrink-0" />{g}
                          </div>
                        ))}
                        <p className="text-xs text-gray-500">+{roadmap.academicGoals.length - 3} more goals…</p>
                      </div>
                    </div>

                    {/* Projects */}
                    <div className="grid grid-cols-3 gap-3">
                      {roadmap.projects.map((p,i) => (
                        <div key={i} className="glass rounded-2xl p-4 border border-indigo-500/15">
                          <span className="text-xs font-bold text-indigo-400 block mb-2">Project {i+1}</span>
                          <p className="text-white text-xs font-semibold leading-snug">{p.title}</p>
                          <span className={`inline-block mt-2 text-xs px-2 py-0.5 rounded-full ${i===0?'text-green-300 bg-green-500/20':i===1?'text-yellow-300 bg-yellow-500/20':'text-red-300 bg-red-500/20'}`}>{p.difficulty}</span>
                        </div>
                      ))}
                    </div>

                    {/* Timeline */}
                    <div className="glass rounded-2xl p-5">
                      <p className="text-xs font-bold text-purple-400 uppercase tracking-wider mb-3">📅 Timeline</p>
                      <div className="space-y-2">
                        {roadmap.phases.map((ph,i) => (
                          <div key={i} className="flex items-start gap-3">
                            <span className={`text-xs font-bold px-2 py-0.5 rounded-full flex-shrink-0 ${['bg-indigo-500/30 text-indigo-300','bg-purple-500/30 text-purple-300','bg-blue-500/30 text-blue-300','bg-green-500/30 text-green-300'][i%4]}`}>{ph.range}</span>
                            <span className="text-xs text-gray-400">{ph.label} — {ph.tasks[0]}</span>
                          </div>
                        ))}
                      </div>
                    </div>

                    {/* Weekly highlights */}
                    <div className="glass rounded-2xl p-5">
                      <p className="text-xs font-bold text-pink-400 uppercase tracking-wider mb-3">📋 Week 1–2 Tasks</p>
                      <div className="grid grid-cols-2 gap-1.5">
                        {roadmap.weeklyTasks[0].tasks.map((t,i) => (
                          <div key={i} className="flex items-center gap-2 text-xs text-gray-300">
                            <span className="w-1.5 h-1.5 rounded-full bg-pink-400 flex-shrink-0" />{t}
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                )}
              </div>

              {/* Footer */}
              <div className="px-7 pb-6 pt-4 border-t border-white/5 flex-shrink-0 flex items-center gap-3">
                {slide === 0 && (
                  <button onClick={() => setSlide(1)}
                    className="flex-1 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold py-3.5 rounded-2xl hover:shadow-xl hover:shadow-indigo-500/30 transition-all duration-200 flex items-center justify-center gap-2 btn-active">
                    Watch AI Generate <ArrowIcon />
                  </button>
                )}
                {slide === 1 && (
                  <div className="flex-1 flex items-center justify-center gap-2 text-gray-400 text-sm py-3.5">
                    <span className="w-2 h-2 rounded-full bg-indigo-400 animate-pulse" /> Auto-advancing…
                  </div>
                )}
                {slide === 2 && (
                  <>
                    <button onClick={closeModal}
                      className="glass hover:bg-white/10 text-gray-300 font-semibold px-5 py-3.5 rounded-2xl transition-all btn-active text-sm">
                      Close
                    </button>
                    <button onClick={() => { closeModal(); setTimeout(onCTA, 280); }}
                      className="flex-1 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold py-3.5 rounded-2xl hover:shadow-xl hover:shadow-indigo-500/30 transition-all duration-200 flex items-center justify-center gap-2 btn-active">
                      <SparkleIcon /> Create My Own Roadmap <ArrowIcon />
                    </button>
                  </>
                )}
              </div>
            </div>
          </div>
        );
      }

      // ── Modal ──────────────────────────────────────────────────────────────
      const STEPS = [
        {
          title: "Let's get to know you",
          fields: [
            { key:'name', label:'Your Name', placeholder:'e.g. Alex', type:'text' },
            { key:'age', label:'Your Age', placeholder:'e.g. 16', type:'number' },
          ],
        },
        {
          title: 'Academic profile',
          fields: [
            { key:'grade', label:'Current Grade / Year', placeholder:'e.g. Grade 10 / Year 11', type:'text' },
            { key:'gpa', label:'Current GPA (out of 5.0)', placeholder:'e.g. 4.2', type:'number' },
          ],
        },
        {
          title: 'Your goals',
          fields: [
            { key:'country', label:'Target Country', placeholder:'e.g. USA, UK, Canada, Germany, Australia', type:'text', hint:'Where do you want to study?' },
            { key:'major', label:'Intended Major', placeholder:'e.g. Computer Science, Medicine, Business', type:'text' },
            { key:'timeline', label:'Timeline (months)', placeholder:'e.g. 12', type:'number', hint:'How many months until applications?' },
          ],
        },
        {
          title: 'Skills & English',
          fields: [
            { key:'englishLevel', label:'English Level', placeholder:'Beginner / Intermediate / Advanced', type:'text', hint:'Be honest — this helps calibrate your plan.' },
            { key:'skills', label:'Your Current Skills', placeholder:'e.g. Python, public speaking, photography', type:'text' },
          ],
        },
      ];

      function Modal({ onClose, onGenerate }) {
        const [step, setStep] = useState(0);
        const [answers, setAnswers] = useState({ name:'', age:'', grade:'', gpa:'', country:'', major:'', timeline:'12', englishLevel:'', skills:'' });
        const [generating, setGenerating] = useState(false);
        const [genStep, setGenStep] = useState(-1);
        const [done, setDone] = useState(false);
        const [visible, setVisible] = useState(true);
        const totalSteps = STEPS.length;

        const getGenSteps = () => [
          'Analyzing your academic profile…',
          'Mapping university requirements for ' + (answers.country || 'your target country') + '…',
          'Tailoring ' + (answers.major || 'your major') + ' project ideas…',
          'Building your month-by-month timeline…',
          'Generating weekly action tasks…',
        ];

        const handleNext = () => {
          if (step < totalSteps - 1) { setStep(s => s + 1); return; }
          setGenerating(true);
          setGenStep(0);
          const steps = getGenSteps();
          let i = 0;
          const iv = setInterval(() => {
            i++;
            setGenStep(i);
            if (i >= steps.length - 1) {
              clearInterval(iv);
              setTimeout(() => { setGenerating(false); setDone(true); }, 700);
            }
          }, 480);
        };

        const closeModal = () => {
          setVisible(false);
          setTimeout(onClose, 260);
        };

        const handleFinish = () => {
          const roadmap = generateRoadmap(answers);
          onGenerate(roadmap);
          closeModal();
        };

        const updateField = (key, val) => setAnswers(a => ({...a, [key]: val}));
        const currentFields = STEPS[step].fields;
        const genSteps = getGenSteps();

        const overlayBg = visible ? 'opacity-100' : 'opacity-0';
        const cardAnim  = visible ? 'modal-enter' : 'modal-exit';

        return (
          <div className={`fixed inset-0 z-50 flex items-center justify-center p-4 transition-opacity duration-300 ${overlayBg}`}>
            <div className="absolute inset-0 bg-black/75 backdrop-blur-md" onClick={e => e.target === e.currentTarget && closeModal()} />
            <div className={`relative w-full max-w-lg overflow-y-auto max-h-[90vh] ${cardAnim}`}
              style={{background:'linear-gradient(135deg,rgba(17,17,40,.98) 0%,rgba(10,10,30,.98) 100%)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:'28px',padding:'32px'}}>

              {!done && !generating && (
                <>
                  <div className="flex items-center justify-between mb-2">
                    <span className="text-indigo-400 text-sm font-semibold">Step {step+1} of {totalSteps}</span>
                    <button onClick={closeModal} className="text-gray-400 hover:text-white w-8 h-8 flex items-center justify-center rounded-xl hover:bg-white/10 transition-all text-lg">✕</button>
                  </div>
                  <div className="flex gap-2 mb-6">
                    {STEPS.map((_,i) => (
                      <div key={i} onClick={() => i < step && setStep(i)}
                        className={`h-1.5 rounded-full transition-all duration-400 ${i === step ? 'bg-gradient-to-r from-indigo-500 to-purple-500 flex-1' : i < step ? 'bg-purple-600/60 w-8 cursor-pointer hover:bg-purple-500/80' : 'bg-white/10 w-8'}`} />
                    ))}
                  </div>
                  <h3 className="text-2xl font-bold text-white mb-1">{STEPS[step].title}</h3>
                  <p className="text-gray-500 text-sm mb-6">Fill in your details to personalize your roadmap</p>
                  <div className="space-y-4 mb-6">
                    {currentFields.map(field => (
                      <div key={field.key}>
                        <label className="block text-sm font-semibold text-gray-300 mb-2">{field.label}</label>
                        <input
                          type={field.type}
                          placeholder={field.placeholder}
                          value={answers[field.key]}
                          onChange={e => updateField(field.key, e.target.value)}
                          onKeyDown={e => e.key === 'Enter' && handleNext()}
                          className="w-full rounded-2xl px-5 py-3.5 text-white placeholder-gray-600 focus:outline-none transition-all text-sm"
                          style={{background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.1)'}}
                          onFocus={e => { e.target.style.borderColor='rgba(99,102,241,0.6)'; e.target.style.background='rgba(99,102,241,0.08)'; }}
                          onBlur={e => { e.target.style.borderColor='rgba(255,255,255,0.1)'; e.target.style.background='rgba(255,255,255,0.06)'; }}
                        />
                        {field.hint && <p className="text-xs text-gray-500 mt-1.5 ml-1">{field.hint}</p>}
                      </div>
                    ))}
                  </div>
                  <div className="flex gap-3">
                    {step > 0 && (
                      <button onClick={() => setStep(s => s-1)}
                        className="glass hover:bg-white/10 text-gray-300 hover:text-white font-semibold px-5 py-3.5 rounded-2xl transition-all duration-200 btn-active">
                        ← Back
                      </button>
                    )}
                    <button onClick={handleNext}
                      className="flex-1 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold py-3.5 rounded-2xl hover:shadow-xl hover:shadow-indigo-500/30 hover:from-indigo-500 hover:to-purple-500 transition-all duration-200 flex items-center justify-center gap-2 btn-active">
                      {step < totalSteps - 1 ? 'Continue' : 'Generate My Roadmap'} <ArrowIcon />
                    </button>
                  </div>
                </>
              )}

              {generating && (
                <div className="py-6">
                  <div className="relative w-20 h-20 mx-auto mb-6">
                    <div className="absolute inset-0 rounded-full ring-spin" style={{border:'3px solid transparent',borderTopColor:'#6366f1',borderRightColor:'#a855f7'}} />
                    <div className="absolute inset-2 rounded-full bg-gradient-to-br from-indigo-600 to-purple-600 flex items-center justify-center">
                      <SparkleIcon />
                    </div>
                  </div>
                  <h3 className="text-xl font-bold text-white text-center mb-1">Building your roadmap…</h3>
                  <p className="text-gray-400 text-center text-sm mb-7">Personalizing every section just for you</p>
                  <div className="space-y-2.5">
                    {genSteps.map((t,i) => (
                      <div key={i} className={`flex items-center gap-3 p-3.5 rounded-2xl border transition-all duration-400 ${genStep >= i ? 'border-white/10 bg-white/5' : 'border-transparent opacity-25'}`}>
                        <div className={`w-7 h-7 rounded-full flex items-center justify-center flex-shrink-0 transition-all duration-300 ${genStep > i ? 'bg-gradient-to-br from-green-500 to-emerald-500' : genStep === i ? 'bg-indigo-600 glow-pulse' : 'bg-white/10'}`}>
                          {genStep > i
                            ? <svg viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="w-3.5 h-3.5"><polyline points="20 6 9 17 4 12"/></svg>
                            : genStep === i
                              ? <span className="w-2.5 h-2.5 rounded-full bg-white animate-pulse" />
                              : <span className="text-gray-600 text-xs">{i+1}</span>}
                        </div>
                        <span className={`text-sm ${genStep >= i ? 'text-gray-200' : 'text-gray-600'}`}>{t}</span>
                        {genStep > i && <span className="ml-auto text-green-400 text-xs font-bold">✓</span>}
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {done && (
                <div className="text-center py-2">
                  {/* Burst rings */}
                  <div className="relative w-20 h-20 mx-auto mb-6">
                    <div className="absolute inset-0 rounded-full bg-green-500/20 animate-ping" style={{animationDuration:'1.4s'}} />
                    <div className="absolute inset-0 rounded-full bg-green-500/10 animate-ping" style={{animationDuration:'1.8s',animationDelay:'0.3s'}} />
                    <div className="relative w-20 h-20 rounded-full bg-gradient-to-br from-green-500 to-emerald-600 flex items-center justify-center check-pop">
                      <svg viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="w-9 h-9"><polyline points="20 6 9 17 4 12"/></svg>
                    </div>
                  </div>
                  <h3 className="text-2xl font-bold text-white mb-1">
                    {answers.name ? `Roadmap ready, ${answers.name}!` : 'Your roadmap is ready!'}
                  </h3>
                  <p className="text-gray-400 mb-5 text-sm">
                    A personalized <strong className="text-white">{answers.timeline || 12}-month plan</strong> for{' '}
                    <strong className="text-white">{answers.major || 'your major'}</strong> in{' '}
                    <strong className="text-white">{answers.country || 'your target country'}</strong>.
                  </p>
                  <div className="grid grid-cols-3 gap-3 mb-6">
                    {[
                      {icon:'📚', label:'Academic goals', color:'from-indigo-500/20 to-blue-500/20'},
                      {icon:'🛠️', label:'3 projects',     color:'from-purple-500/20 to-pink-500/20'},
                      {icon:'📅', label:'Monthly plan',   color:'from-green-500/20 to-emerald-500/20'},
                    ].map((item,i) => (
                      <div key={i} className={`bg-gradient-to-br ${item.color} border border-white/10 rounded-2xl p-3 text-center`}>
                        <div className="text-2xl mb-1">{item.icon}</div>
                        <div className="text-xs text-gray-300 font-medium">{item.label}</div>
                      </div>
                    ))}
                  </div>
                  <button onClick={handleFinish}
                    className="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-bold py-4 rounded-2xl hover:shadow-xl hover:shadow-indigo-500/40 transition-all duration-200 flex items-center justify-center gap-2 btn-active">
                    View My Full Roadmap <ArrowIcon />
                  </button>
                  <p className="text-gray-600 text-xs mt-3">Scroll down after closing to see your roadmap</p>
                </div>
              )}
            </div>
          </div>
        );
      }

      // ── Auth Field (module-level to prevent focus loss on re-render) ─────────
      function AuthField({ label, type, placeholder, value, onChange, onKeyDown }) {
        return (
          <div>
            <label className="block text-sm font-semibold text-gray-300 mb-2">{label}</label>
            <input
              type={type || 'text'}
              placeholder={placeholder}
              value={value}
              onChange={onChange}
              onKeyDown={onKeyDown}
              className="auth-input"
            />
          </div>
        );
      }

      // ── Auth Modal ─────────────────────────────────────────────────────────
      function AuthModal({ mode: initMode, onClose }) {
        const { login, signup } = useAuth();
        const { t } = useLang();
        const [mode, setMode]     = useState(initMode);
        const [name, setName]     = useState('');
        const [email, setEmail]   = useState('');
        const [pw, setPw]         = useState('');
        const [error, setError]   = useState('');
        const [loading, setLoading] = useState(false);
        const [visible, setVisible] = useState(true);

        const close = () => { setVisible(false); setTimeout(onClose, 260); };

        const submit = async () => {
          setLoading(true); setError('');
          await new Promise(r => setTimeout(r, 500));
          const err = mode === 'login'
            ? login(email, pw)
            : signup(name, email, pw);
          setLoading(false);
          if (err) { setError(err); return; }
          close();
        };

        const onKey = (e) => { if (e.key === 'Enter') submit(); };

        return (
          <div className={`fixed inset-0 z-50 flex items-center justify-center p-4 transition-opacity duration-300 ${visible?'opacity-100':'opacity-0'}`}>
            <div className="absolute inset-0 bg-black/80 backdrop-blur-md" onClick={close}/>
            <div className={`relative w-full max-w-md ${visible?'modal-enter':'modal-exit'}`}
              style={{background:'linear-gradient(135deg,rgba(17,17,40,.99),rgba(10,10,30,.99))',border:'1px solid rgba(255,255,255,0.1)',borderRadius:'28px',padding:'36px'}}>
              {/* Header */}
              <div className="flex items-center justify-between mb-7">
                <div>
                  <h2 className="text-2xl font-black text-white">{mode==='login'?t('loginTitle'):t('signupTitle')}</h2>
                  <p className="text-gray-500 text-sm mt-1">{mode==='login'?t('loginSub'):t('signupSub')}</p>
                </div>
                <button onClick={close} className="w-9 h-9 flex items-center justify-center rounded-xl text-gray-400 hover:text-white hover:bg-white/10 transition-all text-lg">✕</button>
              </div>

              {/* Fields — using module-level AuthField to prevent focus loss */}
              <div className="space-y-4 mb-5">
                {mode==='signup' && (
                  <AuthField label={t('labelName')} type="text" placeholder={t('phName')}
                    value={name} onChange={e=>{setName(e.target.value);setError('');}} onKeyDown={onKey}/>
                )}
                <AuthField label={t('labelEmail')} type="email" placeholder={t('phEmail')}
                  value={email} onChange={e=>{setEmail(e.target.value);setError('');}} onKeyDown={onKey}/>
                <AuthField label={t('labelPassword')} type="password"
                  placeholder={mode==='login'?t('phPwLogin'):t('phPwSignup')}
                  value={pw} onChange={e=>{setPw(e.target.value);setError('');}} onKeyDown={onKey}/>
              </div>

              {error && (
                <div className="flex items-center gap-2 bg-red-500/10 border border-red-500/25 rounded-xl px-4 py-3 mb-5">
                  <span className="text-red-400 text-sm">⚠️</span>
                  <span className="text-red-300 text-sm">{error}</span>
                </div>
              )}

              <button onClick={submit} disabled={loading}
                className="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-bold py-4 rounded-2xl transition-all duration-200 hover:shadow-xl hover:shadow-indigo-500/30 btn-active flex items-center justify-center gap-2 disabled:opacity-60">
                {loading
                  ? <><div className="w-4 h-4 border-2 border-white/40 border-t-white rounded-full ring-spin"/><span>Please wait…</span></>
                  : <><SparkleIcon /><span>{mode==='login'?t('btnLogin'):t('btnSignup')}</span></>}
              </button>

              <p className="text-center text-gray-500 text-sm mt-5">
                {mode==='login'?t('noAccount'):t('hasAccount')}
                <button onClick={() => { setMode(mode==='login'?'signup':'login'); setError(''); }}
                  className="text-indigo-400 hover:text-indigo-300 font-semibold transition-colors">
                  {mode==='login'?t('switchSignup'):t('switchLogin')}
                </button>
              </p>
            </div>
          </div>
        );
      }

      // ── User Dashboard Page ────────────────────────────────────────────────
      function UserDashboardPage({ onOpenAuth, onGenerateRoadmap }) {
        const { user, updateUser } = useAuth();
        const { lang, t } = useLang();
        const [progress, setProgress] = useState(0);

        const tasks   = user ? (user.tasks || DEFAULT_TASKS) : DEFAULT_TASKS;
        const streak  = user ? (user.streak || 0) : 0;
        const roadmap = user ? user.roadmap : null;

        const done    = tasks.filter(tk => tk.done).length;
        const donePct = Math.round((done / tasks.length) * 100);

        useEffect(() => { const id = setTimeout(() => setProgress(donePct), 300); return () => clearTimeout(id); }, [donePct]);

        const toggleTask = (id) => {
          if (!user) return;
          updateUser({ tasks: tasks.map(tk => tk.id === id ? {...tk, done:!tk.done} : tk) });
        };

        const tagStyle = {
          Exam:      'text-indigo-300 bg-indigo-500/20 border-indigo-500/25',
          Essay:     'text-purple-300 bg-purple-500/20 border-purple-500/25',
          Rec:       'text-pink-300   bg-pink-500/20   border-pink-500/25',
          Planning:  'text-green-300  bg-green-500/20  border-green-500/25',
          Portfolio: 'text-blue-300   bg-blue-500/20   border-blue-500/25',
        };

        if (!user) return (
          <div className="min-h-screen flex items-center justify-center px-6 py-32">
            <div className="text-center max-w-md">
              <div className="text-6xl mb-6">🔒</div>
              <h2 className="text-3xl font-black text-white mb-3">{t('lockedTitle')}</h2>
              <p className="text-gray-400 mb-8 leading-relaxed">{t('lockedSub')}</p>
              <div className="flex gap-3 justify-center">
                <button onClick={() => onOpenAuth('login')} className="glass hover:bg-white/10 text-gray-300 font-semibold px-6 py-3 rounded-2xl transition-all btn-active">{t('login')}</button>
                <button onClick={() => onOpenAuth('signup')} className="bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold px-6 py-3 rounded-2xl hover:shadow-xl hover:shadow-indigo-500/30 transition-all btn-active flex items-center gap-2"><SparkleIcon /> {t('signup')}</button>
              </div>
            </div>
          </div>
        );

        return (
          <div className="min-h-screen pt-28 pb-20 px-6 page-in">
            <div className="max-w-7xl mx-auto">
              {/* Header */}
              <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 mb-10">
                <div>
                  <div className="inline-flex items-center gap-2 glass rounded-full px-4 py-1.5 mb-3 text-xs text-green-300">
                    <span className="w-1.5 h-1.5 rounded-full bg-green-400 animate-pulse"/> {t('personalDashboard')}
                  </div>
                  <h1 className="text-3xl md:text-4xl font-black text-white">{t('dashWelcome')}, <span className="shimmer-text">{user.name.split(' ')[0]}</span></h1>

                </div>
                {!roadmap && (
                  <button onClick={onGenerateRoadmap}
                    className="bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-bold px-6 py-3 rounded-2xl hover:shadow-xl hover:shadow-indigo-500/30 transition-all btn-active flex items-center gap-2 text-sm flex-shrink-0">
                    <SparkleIcon /> {t('genRoadmap')}
                  </button>
                )}
              </div>

              {/* Stat row */}
              <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                {[
                  {icon:'✅', label:t('statTasksDone'), value:`${done}/${tasks.length}`, color:'text-green-400'},
                  {icon:'🔥', label:t('statStreak'),    value:`${streak}d`,              color:'text-orange-400'},
                  {icon:'📊', label:t('statProgress'),  value:`${donePct}%`,             color:'text-indigo-400'},
                  {icon:'🗺️', label:t('statRoadmap'),   value: roadmap ? t('active') : t('none'), color: roadmap?'text-purple-400':'text-gray-500'},
                ].map((s,i) => (
                  <div key={i} className="glass-strong rounded-2xl p-5 card-hover">
                    <div className="text-2xl mb-2">{s.icon}</div>
                    <p className={`text-xl font-black ${s.color}`}>{s.value}</p>
                    <p className="text-gray-500 text-xs mt-0.5">{s.label}</p>
                  </div>
                ))}
              </div>

              <div className="grid lg:grid-cols-3 gap-6">
                {/* Left: tasks + progress */}

                        </div>

                </div>

                            <span className="text-gray-500 text-xs flex-shrink-0 w-16">{row.label}</span>
                            <span className="text-white text-sm font-medium truncate">{row.value}</span>
                          </div>

                    <div className="flex items-center gap-3 mb-4">

                  </div>

      // ── University Detail Modal ────────────────────────────────────────────
      function UniversityModal({ univ, onClose }) {
        const { t } = useLang();
        const [visible, setVisible] = useState(true);
        const close = () => { setVisible(false); setTimeout(onClose, 260); };
        const typeColor = { Reach:'text-orange-300 bg-orange-500/15 border-orange-500/25', Match:'text-blue-300 bg-blue-500/15 border-blue-500/25', Safety:'text-green-300 bg-green-500/15 border-green-500/25' };
        return (
          <div className={`fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 transition-opacity duration-300 ${visible?'opacity-100':'opacity-0'}`}>
            <div className="absolute inset-0 bg-black/85 backdrop-blur-md" onClick={close}/>
            <div className={`relative w-full sm:max-w-2xl max-h-[95vh] sm:max-h-[88vh] flex flex-col ${visible?'modal-enter':'modal-exit'}`}
              style={{background:'linear-gradient(160deg,rgba(17,17,40,.99) 0%,rgba(10,10,30,.99) 100%)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:'28px 28px 0 0',sm:{borderRadius:'28px'}}}>
              {/* Header with image */}
              <div className="univ-card-img flex-shrink-0" style={{height:'160px',borderRadius:'28px 28px 0 0',overflow:'hidden',position:'relative'}}>
                <img src={univ.img} alt={univ.name}
                  onError={e=>{e.target.style.display='none';e.target.parentNode.querySelector('.modal-img-fallback').style.display='flex';}}
                  style={{width:'100%',height:'100%',objectFit:'cover',filter:'brightness(0.6)'}}/>
                <div className="modal-img-fallback" style={{display:'none',position:'absolute',inset:0,background:`linear-gradient(135deg,#1e1b4b,#312e81)`,alignItems:'center',justifyContent:'center',fontSize:'3rem'}}>{univ.flag}</div>
                <div style={{position:'absolute',inset:0,background:'linear-gradient(to bottom,rgba(0,0,0,0) 20%,rgba(10,10,30,0.98) 100%)'}}/>
                <div style={{position:'absolute',bottom:'14px',left:'20px',right:'48px'}}>
                  <p className="text-white font-black text-xl leading-tight drop-shadow">{univ.name}</p>
                  <p className="text-white/60 text-sm">{univ.flag} {univ.country} · {univ.rank}</p>
                </div>
                <button onClick={close} style={{position:'absolute',top:'12px',right:'12px'}}
                  className="w-9 h-9 flex items-center justify-center rounded-xl bg-black/50 text-gray-300 hover:text-white hover:bg-black/70 transition-all text-base">✕</button>
              </div>

              {/* Scrollable body */}
              <div className="flex-1 overflow-y-auto px-6 py-5 space-y-6">
                {/* Quick stats row */}
                <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
                  {[
                    {icon:'💰', label:t('labelTuition'), value:univ.tuition},
                    {icon:'📊', label:t('labelGpa'), value:univ.gpa},
                    {icon:'🌍', label:'Country', value:univ.country},
                    {icon:'🎯', label:'Type', value:<span className={`tag-pill border ${typeColor[univ.type]}`}>{univ.type}</span>},
                  ].map((s,i)=>(
                    <div key={i} className="glass rounded-2xl p-3 text-center">
                      <div className="text-lg mb-1">{s.icon}</div>
                      <div className="text-xs text-gray-500 mb-0.5">{s.label}</div>
                      <div className="text-white text-sm font-semibold">{s.value}</div>
                    </div>
                  ))}
                </div>

                {/* Overview */}
                <div>
                  <h3 className="text-white font-bold text-base mb-2 flex items-center gap-2">
                    <span className="w-6 h-6 rounded-lg bg-indigo-500/20 flex items-center justify-center text-xs">🏛</span>
                    {t('modalOverview')}
                  </h3>
                  <p className="text-gray-400 text-sm leading-relaxed">{univ.desc}</p>
                </div>

                {/* Exams + Achievements */}
                <div className="grid sm:grid-cols-2 gap-4">
                  <div>
                    <h4 className="text-xs text-gray-400 uppercase tracking-wider mb-2">{t('labelExams')}</h4>
                    <div className="flex flex-wrap gap-1.5">
                      {univ.exams.map((e,i)=><span key={i} className="text-xs text-indigo-300 bg-indigo-500/15 border border-indigo-500/20 rounded-full px-2.5 py-1">{e}</span>)}
                    </div>
                  </div>
                  <div>
                    <h4 className="text-xs text-gray-400 uppercase tracking-wider mb-2">{t('labelAchiev')}</h4>
                    <div className="flex flex-wrap gap-1.5">
                      {univ.achievements.map((a,i)=><span key={i} className="text-xs text-gray-300 bg-white/5 border border-white/10 rounded-full px-2.5 py-1">{a}</span>)}
                    </div>
                  </div>
                </div>

                {/* Admission Steps */}
                {univ.admissionSteps && (
                  <div>
                    <h3 className="text-white font-bold text-base mb-3 flex items-center gap-2">
                      <span className="w-6 h-6 rounded-lg bg-purple-500/20 flex items-center justify-center text-xs">📋</span>
                      {t('modalAdmSteps')}
                    </h3>
                    <div className="space-y-2.5">
                      {univ.admissionSteps.map((step, i) => (
                        <div key={i} className="flex items-start gap-3">
                          <span className="flex-shrink-0 w-6 h-6 rounded-full bg-gradient-to-br from-indigo-600 to-purple-600 flex items-center justify-center text-xs font-bold text-white mt-0.5">{i+1}</span>
                          <p className="text-gray-300 text-sm leading-relaxed">{step}</p>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* Tips */}
                {univ.tips && (
                  <div>
                    <h3 className="text-white font-bold text-base mb-3 flex items-center gap-2">
                      <span className="w-6 h-6 rounded-lg bg-yellow-500/20 flex items-center justify-center text-xs">💡</span>
                      {t('modalTips')}
                    </h3>
                    <div className="space-y-2">
                      {univ.tips.map((tip, i) => (
                        <div key={i} className="flex items-start gap-2.5 glass rounded-xl px-4 py-2.5">
                          <span className="text-yellow-400 text-xs mt-0.5 flex-shrink-0">★</span>
                          <p className="text-gray-300 text-sm leading-relaxed">{tip}</p>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>

              {/* Footer */}
              <div className="px-6 py-4 border-t border-white/5 flex-shrink-0">
                <button onClick={close}
                  className="w-full glass hover:bg-white/10 text-gray-300 hover:text-white font-semibold py-3 rounded-2xl transition-all btn-active text-sm">
                  {t('modalClose')}
                </button>
              </div>
            </div>
          </div>
        );
      }

        const [search, setSearch] = useState('');
        const [activeTab, setActiveTab] = useState('universities');
        const [selectedUniv, setSelectedUniv] = useState(null);

        const europe = ['Switzerland','Germany','Belgium','Netherlands'];
        const filtered = UNIVERSITIES.filter(u => {
          const countryGroup = filter === 'Europe' ? europe.includes(u.country) : filter === 'All' ? true : u.country === filter;
          const searchMatch = !search || u.name.toLowerCase().includes(search.toLowerCase()) || u.country.toLowerCase().includes(search.toLowerCase());
          return countryGroup && searchMatch;
        });

        const typeColor = { Reach:'text-orange-300 bg-orange-500/15 border-orange-500/25', Match:'text-blue-300 bg-blue-500/15 border-blue-500/25', Safety:'text-green-300 bg-green-500/15 border-green-500/25' };

        return (
          <div className="min-h-screen pt-28 pb-20 px-6 page-in">

              {/* Header */}
              <div className="text-center mb-12">
                <div className="inline-flex items-center gap-2 glass rounded-full px-4 py-2 mb-4 text-sm text-indigo-300">
                  <span className="text-lg">🌍</span> {t('univBadge')}
                </div>
                <h1 className="text-4xl md:text-5xl font-black text-white mb-4"><span className="shimmer-text">{t('univTitle')}</span></h1>

                  </button>

              </div>

                  <div className="flex flex-col sm:flex-row gap-4 mb-8">
                    <div className="flex gap-2 flex-wrap">
                      {COUNTRY_KEYS.map((key, i) => (
                        <button key={key} onClick={() => setFilter(key)}

                          {Array.isArray(countryLabels) ? countryLabels[i] : key}
                        </button>
                      ))}
                    </div>
                    <input value={search} onChange={e => setSearch(e.target.value)} placeholder={t('searchPH')}
                      className="ml-auto px-5 py-2.5 rounded-xl text-sm text-white placeholder-gray-600 auth-input"
                      style={{minWidth:'200px'}}/>
                  </div>

                  {/* University cards */}
                  <div className="grid md:grid-cols-2 xl:grid-cols-3 gap-5">
                    {filtered.map((u,i) => (
                      <div key={i} onClick={() => setSelectedUniv(u)}

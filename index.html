<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PathPilot AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
      * { font-family: 'Inter', sans-serif; }
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }
      @keyframes pulse-glow {
        0%, 100% { box-shadow: 0 0 20px rgba(99, 102, 241, 0.4); }
        50% { box-shadow: 0 0 40px rgba(99, 102, 241, 0.8); }
      }
      @keyframes shimmer {
        0% { background-position: -200% center; }
        100% { background-position: 200% center; }
      }
      @keyframes slide-up {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .float { animation: float 3s ease-in-out infinite; }
      .pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }
      .slide-up { animation: slide-up 0.6s ease-out forwards; }
      .fade-in { animation: fade-in 0.8s ease-out forwards; }
      .shimmer-text {
        background: linear-gradient(90deg, #6366f1, #8b5cf6, #ec4899, #6366f1);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: shimmer 3s linear infinite;
      }
      .glass {
        background: rgba(255, 255, 255, 0.045);
        backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.09);
      }
      .glass-strong {
        background: rgba(255, 255, 255, 0.07);
        backdrop-filter: blur(32px);
        border: 1px solid rgba(255, 255, 255, 0.13);
      }
      .card-hover {
        transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .card-hover:hover {
        transform: translateY(-5px);
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255,255,255,0.07);
      }
      .progress-bar-fill {
        transition: width 1.6s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .tag-pill {
        display: inline-flex;
        align-items: center;
        font-size: 0.7rem;
        font-weight: 600;
        padding: 2px 10px;
        border-radius: 999px;
        letter-spacing: 0.02em;
      }
      .section-fade {
        animation: slide-up 0.7s ease-out both;
      }
      @keyframes bar-grow {
        from { width: 0%; }
      }
      .bar-grow { animation: bar-grow 1.4s cubic-bezier(0.4,0,0.2,1) both; }
      @keyframes scale-in {
        from { opacity: 0; transform: scale(0.92) translateY(16px); }
        to   { opacity: 1; transform: scale(1)    translateY(0); }
      }
      @keyframes scale-out {
        from { opacity: 1; transform: scale(1)    translateY(0); }
        to   { opacity: 0; transform: scale(0.92) translateY(16px); }
      }
      @keyframes check-pop {
        0%   { transform: scale(0) rotate(-15deg); opacity: 0; }
        60%  { transform: scale(1.2) rotate(5deg); opacity: 1; }
        100% { transform: scale(1) rotate(0deg);  opacity: 1; }
      }
      @keyframes ring-spin {
        to { transform: rotate(360deg); }
      }
      @keyframes count-up {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes demo-slide {
        from { opacity: 0; transform: translateX(24px); }
        to   { opacity: 1; transform: translateX(0); }
      }
      @keyframes glow-pulse {
        0%, 100% { opacity: .6; }
        50%       { opacity: 1; }
      }
      .modal-enter   { animation: scale-in  0.35s cubic-bezier(0.34,1.56,0.64,1) forwards; }
      .modal-exit    { animation: scale-out 0.25s ease-in forwards; }
      .check-pop     { animation: check-pop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards; }
      .ring-spin     { animation: ring-spin 0.9s linear infinite; }
      .demo-slide    { animation: demo-slide 0.4s ease-out forwards; }
      .glow-pulse    { animation: glow-pulse 2s ease-in-out infinite; }
      .btn-active:active { transform: scale(0.97); }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #0f0f1a; }
      ::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 3px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect, useRef } = React;

      // ── Icons (inline SVG components) ──────────────────────────────────────
      const MapIcon = () => (
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6">
          <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/>
          <line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/>
        </svg>
      );
      const TrendIcon = () => (
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6">
          <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
          <polyline points="17 6 23 6 23 12"/>
        </svg>
      );
      const UnivIcon = () => (
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      );
      const CheckIcon = ({ checked }) => (
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4">
          {checked ? <polyline points="20 6 9 17 4 12"/> : <circle cx="12" cy="12" r="10"/>}
        </svg>
      );
      const FireIcon = () => (
        <svg viewBox="0 0 24 24" fill="currentColor" className="w-5 h-5">
          <path d="M12 23a7 7 0 0 1-7-7c0-3.5 2.5-6 4-8 .5 2 1 3 2 3.5-.5-2 1-4.5 2-6 1 3 3 5 3 7.5.5-1 .5-2.5.5-3.5 1.5 2 2.5 4 2.5 6.5a7 7 0 0 1-7 7z"/>
        </svg>
      );
      const StarIcon = () => (
        <svg viewBox="0 0 24 24" fill="currentColor" className="w-4 h-4">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
      );
      const ArrowIcon = () => (
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5">
          <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
        </svg>
      );
      const SparkleIcon = () => (
        <svg viewBox="0 0 24 24" fill="currentColor" className="w-5 h-5">
          <path d="M12 3L13.5 8.5H19L14.25 11.75L15.75 17.25L12 14L8.25 17.25L9.75 11.75L5 8.5H10.5L12 3Z"/>
        </svg>
      );

      // ── Navbar ─────────────────────────────────────────────────────────────
      function Navbar({ onCTA }) {
        const [scrolled, setScrolled] = useState(false);
        useEffect(() => {
          const handler = () => setScrolled(window.scrollY > 20);
          window.addEventListener('scroll', handler);
          return () => window.removeEventListener('scroll', handler);
        }, []);
        return (
          <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-300 ${scrolled ? 'glass py-3' : 'py-5'}`}>
            <div className="max-w-7xl mx-auto px-6 flex items-center justify-between">
              <div className="flex items-center gap-2">
                <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center">
                  <SparkleIcon />
                </div>
                <span className="text-white font-bold text-xl tracking-tight">PathPilot <span className="text-indigo-400">AI</span></span>
              </div>
              <div className="hidden md:flex items-center gap-8 text-sm text-gray-400">
                <a href="#features" className="hover:text-white transition-colors">Features</a>
                <a href="#dashboard" className="hover:text-white transition-colors">Dashboard</a>
                <a href="#why-us" className="hover:text-white transition-colors">Why Us</a>
              </div>
              <button
                onClick={onCTA}
                className="bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-semibold px-5 py-2.5 rounded-xl transition-all duration-200 hover:shadow-lg hover:shadow-indigo-500/30"
              >
                Get Started Free
              </button>
            </div>
          </nav>
        );
      }

      // ── Hero ───────────────────────────────────────────────────────────────
      function Hero({ onCTA, onDemo }) {
        return (
          <section className="relative min-h-screen flex items-center justify-center overflow-hidden pt-24 pb-16">
            {/* Background blobs */}
            <div className="absolute inset-0 overflow-hidden pointer-events-none">
              <div className="absolute top-1/4 left-1/4 w-96 h-96 bg-indigo-600/20 rounded-full blur-3xl" />
              <div className="absolute bottom-1/4 right-1/4 w-80 h-80 bg-purple-600/20 rounded-full blur-3xl" />
              <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-64 h-64 bg-pink-600/10 rounded-full blur-3xl" />
              {/* Grid */}
              <div className="absolute inset-0 opacity-5"
                style={{backgroundImage: 'linear-gradient(rgba(255,255,255,.1) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.1) 1px, transparent 1px)', backgroundSize: '60px 60px'}} />
            </div>

            <div className="relative z-10 max-w-5xl mx-auto px-6 text-center">
              {/* Badge */}
              <div className="inline-flex items-center gap-2 glass rounded-full px-4 py-2 mb-8 text-sm text-indigo-300 slide-up">
                <span className="flex h-2 w-2 rounded-full bg-indigo-400 animate-pulse" />
                Built to help students plan their academic future with clarity
              </div>

              <h1 className="text-5xl md:text-7xl font-black text-white mb-6 leading-tight slide-up" style={{animationDelay:'0.1s'}}>
                Your AI roadmap to{' '}
                <span className="shimmer-text">university success</span>
              </h1>

              <p className="text-xl text-gray-400 max-w-2xl mx-auto mb-10 leading-relaxed slide-up" style={{animationDelay:'0.2s'}}>
                Plan exams, build standout projects, and craft winning applications — all guided by your personal AI advisor built for ambitious teens.
              </p>

              <div className="flex flex-col sm:flex-row items-center justify-center gap-4 slide-up" style={{animationDelay:'0.3s'}}>
                <button
                  onClick={onCTA}
                  className="group relative overflow-hidden bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold text-lg px-8 py-4 rounded-2xl transition-all duration-300 hover:shadow-2xl hover:shadow-indigo-500/40 hover:scale-105 pulse-glow flex items-center gap-3 btn-active"
                >
                  <SparkleIcon />
                  Generate My Roadmap
                  <ArrowIcon />
                  <div className="absolute inset-0 bg-white/10 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-500 skew-x-12" />
                </button>
                <button
                  onClick={onDemo}
                  className="group glass text-gray-300 hover:text-white font-semibold text-lg px-8 py-4 rounded-2xl transition-all duration-200 hover:bg-white/10 hover:border-white/20 btn-active flex items-center gap-3"
                >
                  <svg viewBox="0 0 24 24" fill="currentColor" className="w-5 h-5 text-indigo-400 group-hover:scale-110 transition-transform">
                    <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" strokeWidth="1.5" opacity=".4"/>
                    <polygon points="10 8 16 12 10 16" fill="currentColor"/>
                  </svg>
                  Watch Demo
                </button>
              </div>

              {/* Trust strip */}
              <div className="mt-12 flex flex-wrap items-center justify-center gap-6 text-sm text-gray-500 slide-up" style={{animationDelay:'0.4s'}}>
                {[
                  { icon:'🎓', text:'Designed for university-bound students' },
                  { icon:'🔒', text:'Your data stays in your browser' },
                  { icon:'⚡', text:'Roadmap ready in under 2 minutes' },
                ].map((item, i) => (
                  <div key={i} className="flex items-center gap-2">
                    <span className="text-base">{item.icon}</span>
                    <span className="text-gray-400">{item.text}</span>
                    {i < 2 && <span className="hidden sm:block w-px h-4 bg-white/10 ml-6" />}
                  </div>
                ))}
              </div>

              {/* Floating stats */}
              <div className="mt-16 grid grid-cols-3 gap-4 max-w-lg mx-auto slide-up" style={{animationDelay:'0.5s'}}>
                {[
                  {value:'94%', label:'Admission rate'},
                  {value:'3.2x', label:'More organized'},
                  {value:'47h', label:'Saved per month'},
                ].map((s,i) => (
                  <div key={i} className="glass rounded-2xl p-4 card-hover">
                    <div className="text-2xl font-black text-white">{s.value}</div>
                    <div className="text-xs text-gray-400 mt-1">{s.label}</div>
                  </div>
                ))}
              </div>
            </div>
          </section>
        );
      }

      // ── Features ───────────────────────────────────────────────────────────
      function Features() {
        const cards = [
          {
            icon: <MapIcon />,
            gradient: 'from-indigo-500 to-blue-500',
            glow: 'hover:shadow-indigo-500/30',
            title: 'AI Roadmap',
            desc: 'Get a personalized, step-by-step action plan built around your dream schools, strengths, and timeline — updated as you grow.',
            tags: ['Personalized','Adaptive','Smart'],
          },
          {
            icon: <TrendIcon />,
            gradient: 'from-purple-500 to-pink-500',
            glow: 'hover:shadow-purple-500/30',
            title: 'Progress Tracking',
            desc: 'Visualize every milestone with live dashboards. Track SAT prep, extracurriculars, essays, and more in one clean view.',
            tags: ['Visual','Real-time','Motivating'],
          },
          {
            icon: <UnivIcon />,
            gradient: 'from-pink-500 to-orange-500',
            glow: 'hover:shadow-pink-500/30',
            title: 'University Planner',
            desc: 'Research, compare, and track your college list. Deadline alerts, requirement checklists, and fit scores — all built in.',
            tags: ['Deadline alerts','Comparison','Fit score'],
          },
        ];
        return (
          <section id="features" className="py-24 relative">
            <div className="max-w-7xl mx-auto px-6">
              <div className="text-center mb-16">
                <div className="inline-flex items-center gap-2 glass rounded-full px-4 py-2 mb-4 text-sm text-purple-300">
                  <SparkleIcon /> Everything you need
                </div>
                <h2 className="text-4xl md:text-5xl font-black text-white mb-4">
                  Built for the<br /><span className="shimmer-text">ambitious student</span>
                </h2>
                <p className="text-gray-400 text-lg max-w-xl mx-auto">Three powerful tools, one cohesive platform to get you from "I want to apply" to "I got in."</p>
              </div>

              <div className="grid md:grid-cols-3 gap-6">
                {cards.map((c, i) => (
                  <div key={i} className={`glass rounded-3xl p-8 card-hover group cursor-pointer hover:shadow-2xl ${c.glow} transition-all duration-300`}>
                    <div className={`w-14 h-14 rounded-2xl bg-gradient-to-br ${c.gradient} flex items-center justify-center text-white mb-6 group-hover:scale-110 transition-transform duration-300`}>
                      {c.icon}
                    </div>
                    <h3 className="text-xl font-bold text-white mb-3">{c.title}</h3>
                    <p className="text-gray-400 leading-relaxed mb-6">{c.desc}</p>
                    <div className="flex flex-wrap gap-2">
                      {c.tags.map((t,j) => (
                        <span key={j} className="text-xs font-medium text-gray-300 bg-white/5 border border-white/10 rounded-full px-3 py-1">{t}</span>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </section>
        );
      }

      // ── Dashboard ──────────────────────────────────────────────────────────
      function Dashboard() {
        const [tasks, setTasks] = useState([
          { id:1, text:'Submit SAT / national exam registration', done:true,  tag:'Exam' },
          { id:2, text:'Write Common App personal statement',     done:true,  tag:'Essay' },
          { id:3, text:'Request 2 teacher recommendations',       done:false, tag:'Rec' },
          { id:4, text:'Complete MIT supplemental essay',         done:false, tag:'Essay' },
          { id:5, text:'Finalize college list (12 schools)',       done:false, tag:'Planning' },
          { id:6, text:'Register for AP / A-Level exams',         done:false, tag:'Exam' },
          { id:7, text:'Build portfolio project #1',              done:false, tag:'Portfolio' },
        ]);

        const [progress, setProgress] = useState(0);
        const [streakVisible, setStreakVisible] = useState(false);

        useEffect(() => {
          const t1 = setTimeout(() => setProgress(68), 350);
          const t2 = setTimeout(() => setStreakVisible(true), 700);
          return () => { clearTimeout(t1); clearTimeout(t2); };
        }, []);

        const toggle = (id) => setTasks(prev => prev.map(t => t.id === id ? {...t, done:!t.done} : t));
        const doneCount  = tasks.filter(t => t.done).length;
        const donePct    = Math.round((doneCount / tasks.length) * 100);

        const timeline = [
          { month:'Apr', label:'Foundation',     items:['SAT Prep starts','Essay outline'],        dot:'bg-indigo-500 shadow-indigo-500/60', active:true  },
          { month:'May', label:'Exam Season',    items:['AP / A-Level Exams','Draft Essay 1'],      dot:'bg-purple-500 shadow-purple-500/60', active:true  },
          { month:'Jun', label:'Explore',        items:['Campus visits','Finalise school list'],    dot:'bg-pink-500',   active:false },
          { month:'Jul', label:'Polish',         items:['Essay revisions','Request recs'],          dot:'bg-orange-500', active:false },
          { month:'Aug', label:'Applications',   items:['Common App opens','Activities list'],      dot:'bg-yellow-500', active:false },
          { month:'Sep', label:'Submit',         items:['Submit EA apps','Scholarship search'],     dot:'bg-green-500',  active:false },
        ];

        const tagStyle = {
          Exam:      'text-indigo-300 bg-indigo-500/20 border border-indigo-500/25',
          Essay:     'text-purple-300 bg-purple-500/20 border border-purple-500/25',
          Rec:       'text-pink-300   bg-pink-500/20   border border-pink-500/25',
          Planning:  'text-green-300  bg-green-500/20  border border-green-500/25',
          Portfolio: 'text-blue-300   bg-blue-500/20   border border-blue-500/25',
        };

        const schools = [
          { name:'MIT',                    type:'Reach', fit:91, grad:'from-indigo-500 to-blue-600' },
          { name:'Stanford',               type:'Reach', fit:87, grad:'from-purple-500 to-violet-600' },
          { name:'UC Berkeley',            type:'Match', fit:78, grad:'from-blue-500  to-cyan-600' },
          { name:'University of Michigan', type:'Safety',fit:95, grad:'from-green-500 to-emerald-600' },
        ];

        return (
          <section id="dashboard" className="py-28 relative">
            <div className="absolute inset-0 overflow-hidden pointer-events-none">
              <div className="absolute top-1/4 right-0  w-[500px] h-[500px] bg-purple-600/8  rounded-full blur-3xl" />
              <div className="absolute bottom-1/4 left-0 w-[400px] h-[400px] bg-indigo-600/8 rounded-full blur-3xl" />
              <div className="absolute top-0 left-1/2 -translate-x-1/2 w-[900px] h-px bg-gradient-to-r from-transparent via-white/8 to-transparent" />
            </div>

            <div className="relative z-10 max-w-7xl mx-auto px-6">
              {/* Section header */}
              <div className="text-center mb-16">
                <div className="inline-flex items-center gap-2 glass rounded-full px-4 py-2 mb-4 text-sm text-green-300">
                  <span className="flex h-2 w-2 rounded-full bg-green-400 animate-pulse" /> Interactive Dashboard Preview
                </div>
                <h2 className="text-4xl md:text-5xl font-black text-white mb-4">
                  Your command center<br /><span className="shimmer-text">for college success</span>
                </h2>
                <p className="text-gray-400 max-w-xl mx-auto">Everything tracked in one place. Click tasks to mark them done.</p>
              </div>

              {/* ── Top stat row ── */}
              <div className="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-6">
                {[
                  { icon:'📋', label:'Tasks Done',  value:`${doneCount}/${tasks.length}`, sub:'this week' },
                  { icon:'🔥', label:'Day Streak',  value:'14',   sub:'personal best' },
                  { icon:'📊', label:'GPA (5.0)',    value:'4.6',  sub:'current score' },
                  { icon:'🎯', label:'Apps Ready',  value:'32%',  sub:'completion' },
                ].map((s,i) => (
                  <div key={i} className="glass-strong rounded-2xl p-4 card-hover flex items-center gap-3">
                    <span className="text-2xl flex-shrink-0">{s.icon}</span>
                    <div className="min-w-0">
                      <p className="text-white font-black text-lg leading-none">{s.value}</p>
                      <p className="text-gray-400 text-xs mt-0.5 truncate">{s.label}</p>
                    </div>
                  </div>
                ))}
              </div>

              {/* ── Main grid ── */}
              <div className="grid lg:grid-cols-3 gap-6">

                {/* Left — 2 cols */}
                <div className="lg:col-span-2 space-y-6">

                  {/* Progress + Streak */}
                  <div className="grid sm:grid-cols-2 gap-6">

                    {/* Progress ring card */}
                    <div className="glass rounded-3xl p-6 card-hover">
                      <div className="flex items-start justify-between mb-5">
                        <div>
                          <p className="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-1">Overall Progress</p>
                          <p className="text-5xl font-black text-white leading-none">{progress}<span className="text-2xl text-gray-500 font-bold">%</span></p>
                          <p className="text-xs text-gray-500 mt-1">{100-progress}% remaining</p>
                        </div>
                        <div className="relative w-20 h-20 flex-shrink-0">
                          <svg className="w-20 h-20 -rotate-90" viewBox="0 0 80 80">
                            <circle cx="40" cy="40" r="34" fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth="7"/>
                            <circle cx="40" cy="40" r="34" fill="none" stroke="url(#progGrad)" strokeWidth="7"
                              strokeDasharray="213.6"
                              strokeDashoffset={`${213.6 * (1 - progress/100)}`}
                              strokeLinecap="round"
                              style={{transition:'stroke-dashoffset 1.6s cubic-bezier(0.4,0,0.2,1)'}}/>
                            <defs>
                              <linearGradient id="progGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%"   stopColor="#6366f1"/>
                                <stop offset="100%" stopColor="#a855f7"/>
                              </linearGradient>
                            </defs>
                          </svg>
                          <div className="absolute inset-0 flex items-center justify-center">

                    <button onClick={() => { closeModal(); setTimeout(onCTA, 280); }}
                      className="flex-1 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold py-3.5 rounded-2xl hover:shadow-xl hover:shadow-indigo-500/30 transition-all duration-200 flex items-center justify-center gap-2 btn-active">
                      <SparkleIcon /> Create My Own Roadmap <ArrowIcon />
                    </button>
                  </>
                )}
              </div>
            </div>
          </div>
        );
      }

      // ── Modal ──────────────────────────────────────────────────────────────
      const STEPS = [
        {
          title: "Let's get to know you",
          fields: [
            { key:'name', label:'Your Name', placeholder:'e.g. Alex', type:'text' },
            { key:'age', label:'Your Age', placeholder:'e.g. 16', type:'number' },
          ],
        },
        {
          title: 'Academic profile',
          fields: [
            { key:'grade', label:'Current Grade / Year', placeholder:'e.g. Grade 10 / Year 11', type:'text' },
            { key:'gpa', label:'Current GPA (out of 5.0)', placeholder:'e.g. 4.2', type:'number' },
          ],
        },
        {
          title: 'Your goals',
          fields: [
            { key:'country', label:'Target Country', placeholder:'e.g. USA, UK, Canada, Germany, Australia', type:'text', hint:'Where do you want to study?' },
            { key:'major', label:'Intended Major', placeholder:'e.g. Computer Science, Medicine, Business', type:'text' },
            { key:'timeline', label:'Timeline (months)', placeholder:'e.g. 12', type:'number', hint:'How many months until applications?' },
          ],
        },
        {
          title: 'Skills & English',
          fields: [
            { key:'englishLevel', label:'English Level', placeholder:'Beginner / Intermediate / Advanced', type:'text', hint:'Be honest — this helps calibrate your plan.' },
            { key:'skills', label:'Your Current Skills', placeholder:'e.g. Python, public speaking, photography', type:'text' },
          ],
        },
      ];

      function Modal({ onClose, onGenerate }) {
        const [step, setStep] = useState(0);
        const [answers, setAnswers] = useState({ name:'', age:'', grade:'', gpa:'', country:'', major:'', timeline:'12', englishLevel:'', skills:'' });
        const [generating, setGenerating] = useState(false);
        const [genStep, setGenStep] = useState(-1);
        const [done, setDone] = useState(false);
        const [visible, setVisible] = useState(true);
        const totalSteps = STEPS.length;

        const getGenSteps = () => [
          'Analyzing your academic profile…',
          'Mapping university requirements for ' + (answers.country || 'your target country') + '…',
          'Tailoring ' + (answers.major || 'your major') + ' project ideas…',
          'Building your month-by-month timeline…',
          'Generating weekly action tasks…',
        ];

        const handleNext = () => {
          if (step < totalSteps - 1) { setStep(s => s + 1); return; }
          setGenerating(true);
          setGenStep(0);
          const steps = getGenSteps();
          let i = 0;
          const iv = setInterval(() => {
            i++;
            setGenStep(i);
            if (i >= steps.length - 1) {
              clearInterval(iv);
              setTimeout(() => { setGenerating(false); setDone(true); }, 700);
            }
          }, 480);
        };

        const closeModal = () => {
          setVisible(false);
          setTimeout(onClose, 260);
        };

        const handleFinish = () => {
          const roadmap = generateRoadmap(answers);
          onGenerate(roadmap);
          closeModal();
        };

        const updateField = (key, val) => setAnswers(a => ({...a, [key]: val}));
        const currentFields = STEPS[step].fields;
        const genSteps = getGenSteps();

        const overlayBg = visible ? 'opacity-100' : 'opacity-0';
        const cardAnim  = visible ? 'modal-enter' : 'modal-exit';

        return (
          <div className={`fixed inset-0 z-50 flex items-center justify-center p-4 transition-opacity duration-300 ${overlayBg}`}>
            <div className="absolute inset-0 bg-black/75 backdrop-blur-md" onClick={e => e.target === e.currentTarget && closeModal()} />
            <div className={`relative w-full max-w-lg overflow-y-auto max-h-[90vh] ${cardAnim}`}
              style={{background:'linear-gradient(135deg,rgba(17,17,40,.98) 0%,rgba(10,10,30,.98) 100%)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:'28px',padding:'32px'}}>

              {!done && !generating && (
                <>
                  <div className="flex items-center justify-between mb-2">
                    <span className="text-indigo-400 text-sm font-semibold">Step {step+1} of {totalSteps}</span>
                    <button onClick={closeModal} className="text-gray-400 hover:text-white w-8 h-8 flex items-center justify-center rounded-xl hover:bg-white/10 transition-all text-lg">✕</button>
                  </div>
                  <div className="flex gap-2 mb-6">
                    {STEPS.map((_,i) => (
                      <div key={i} onClick={() => i < step && setStep(i)}
                        className={`h-1.5 rounded-full transition-all duration-400 ${i === step ? 'bg-gradient-to-r from-indigo-500 to-purple-500 flex-1' : i < step ? 'bg-purple-600/60 w-8 cursor-pointer hover:bg-purple-500/80' : 'bg-white/10 w-8'}`} />
                    ))}
                  </div>
                  <h3 className="text-2xl font-bold text-white mb-1">{STEPS[step].title}</h3>
                  <p className="text-gray-500 text-sm mb-6">Fill in your details to personalize your roadmap</p>
                  <div className="space-y-4 mb-6">
                    {currentFields.map(field => (
                      <div key={field.key}>
                        <label className="block text-sm font-semibold text-gray-300 mb-2">{field.label}</label>
                        <input
                          type={field.type}
                          placeholder={field.placeholder}
                          value={answers[field.key]}
                          onChange={e => updateField(field.key, e.target.value)}
                          onKeyDown={e => e.key === 'Enter' && handleNext()}
                          className="w-full rounded-2xl px-5 py-3.5 text-white placeholder-gray-600 focus:outline-none transition-all text-sm"
                          style={{background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.1)'}}
                          onFocus={e => { e.target.style.borderColor='rgba(99,102,241,0.6)'; e.target.style.background='rgba(99,102,241,0.08)'; }}
                          onBlur={e => { e.target.style.borderColor='rgba(255,255,255,0.1)'; e.target.style.background='rgba(255,255,255,0.06)'; }}
                        />
                        {field.hint && <p className="text-xs text-gray-500 mt-1.5 ml-1">{field.hint}</p>}
                      </div>
                    ))}
                  </div>
                  <div className="flex gap-3">
                    {step > 0 && (
                      <button onClick={() => setStep(s => s-1)}
                        className="glass hover:bg-white/10 text-gray-300 hover:text-white font-semibold px-5 py-3.5 rounded-2xl transition-all duration-200 btn-active">
                        ← Back
                      </button>
                    )}
                    <button onClick={handleNext}
                      className="flex-1 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold py-3.5 rounded-2xl hover:shadow-xl hover:shadow-indigo-500/30 hover:from-indigo-500 hover:to-purple-500 transition-all duration-200 flex items-center justify-center gap-2 btn-active">
                      {step < totalSteps - 1 ? 'Continue' : 'Generate My Roadmap'} <ArrowIcon />
                    </button>
                  </div>
                </>
              )}

              {generating && (
                <div className="py-6">
                  <div className="relative w-20 h-20 mx-auto mb-6">
                    <div className="absolute inset-0 rounded-full ring-spin" style={{border:'3px solid transparent',borderTopColor:'#6366f1',borderRightColor:'#a855f7'}} />
                    <div className="absolute inset-2 rounded-full bg-gradient-to-br from-indigo-600 to-purple-600 flex items-center justify-center">
                      <SparkleIcon />
                    </div>
                  </div>
                  <h3 className="text-xl font-bold text-white text-center mb-1">Building your roadmap…</h3>
                  <p className="text-gray-400 text-center text-sm mb-7">Personalizing every section just for you</p>
                  <div className="space-y-2.5">
                    {genSteps.map((t,i) => (
                      <div key={i} className={`flex items-center gap-3 p-3.5 rounded-2xl border transition-all duration-400 ${genStep >= i ? 'border-white/10 bg-white/5' : 'border-transparent opacity-25'}`}>
                        <div className={`w-7 h-7 rounded-full flex items-center justify-center flex-shrink-0 transition-all duration-300 ${genStep > i ? 'bg-gradient-to-br from-green-500 to-emerald-500' : genStep === i ? 'bg-indigo-600 glow-pulse' : 'bg-white/10'}`}>
                          {genStep > i
                            ? <svg viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="w-3.5 h-3.5"><polyline points="20 6 9 17 4 12"/></svg>
                            : genStep === i
                              ? <span className="w-2.5 h-2.5 rounded-full bg-white animate-pulse" />
                              : <span className="text-gray-600 text-xs">{i+1}</span>}
                        </div>
                        <span className={`text-sm ${genStep >= i ? 'text-gray-200' : 'text-gray-600'}`}>{t}</span>
                        {genStep > i && <span className="ml-auto text-green-400 text-xs font-bold">✓</span>}
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {done && (
                <div className="text-center py-2">
                  {/* Burst rings */}
                  <div className="relative w-20 h-20 mx-auto mb-6">
                    <div className="absolute inset-0 rounded-full bg-green-500/20 animate-ping" style={{animationDuration:'1.4s'}} />
                    <div className="absolute inset-0 rounded-full bg-green-500/10 animate-ping" style={{animationDuration:'1.8s',animationDelay:'0.3s'}} />
                    <div className="relative w-20 h-20 rounded-full bg-gradient-to-br from-green-500 to-emerald-600 flex items-center justify-center check-pop">
                      <svg viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="w-9 h-9"><polyline points="20 6 9 17 4 12"/></svg>
                    </div>
                  </div>
                  <h3 className="text-2xl font-bold text-white mb-1">
                    {answers.name ? `Roadmap ready, ${answers.name}!` : 'Your roadmap is ready!'}
                  </h3>
                  <p className="text-gray-400 mb-5 text-sm">
                    A personalized <strong className="text-white">{answers.timeline || 12}-month plan</strong> for{' '}
                    <strong className="text-white">{answers.major || 'your major'}</strong> in{' '}
                    <strong className="text-white">{answers.country || 'your target country'}</strong>.
                  </p>
                  <div className="grid grid-cols-3 gap-3 mb-6">
                    {[
                      {icon:'📚', label:'Academic goals', color:'from-indigo-500/20 to-blue-500/20'},
                      {icon:'🛠️', label:'3 projects',     color:'from-purple-500/20 to-pink-500/20'},
                      {icon:'📅', label:'Monthly plan',   color:'from-green-500/20 to-emerald-500/20'},
                    ].map((item,i) => (
                      <div key={i} className={`bg-gradient-to-br ${item.color} border border-white/10 rounded-2xl p-3 text-center`}>
                        <div className="text-2xl mb-1">{item.icon}</div>
                        <div className="text-xs text-gray-300 font-medium">{item.label}</div>
                      </div>
                    ))}
                  </div>
                  <button onClick={handleFinish}
                    className="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-bold py-4 rounded-2xl hover:shadow-xl hover:shadow-indigo-500/40 transition-all duration-200 flex items-center justify-center gap-2 btn-active">
                    View My Full Roadmap <ArrowIcon />
                  </button>
                  <p className="text-gray-600 text-xs mt-3">Scroll down after closing to see your roadmap</p>
                </div>
              )}
            </div>
          </div>
        );
      }

      // ── App ────────────────────────────────────────────────────────────────
      function App() {
        const [showModal,   setShowModal]   = useState(false);
        const [showDemo,    setShowDemo]    = useState(false);
        const [showPrivacy, setShowPrivacy] = useState(false);
        const [showTerms,   setShowTerms]   = useState(false);
        const [roadmap,     setRoadmap]     = useState(null);
        const roadmapRef = React.useRef(null);

        const openCTA     = () => { setShowDemo(false); setShowPrivacy(false); setShowTerms(false); setShowModal(true); };
        const openDemo    = () => { setShowModal(false); setShowPrivacy(false); setShowTerms(false); setShowDemo(true); };
        const openPrivacy = () => { setShowModal(false); setShowDemo(false); setShowTerms(false); setShowPrivacy(true); };
        const openTerms   = () => { setShowModal(false); setShowDemo(false); setShowPrivacy(false); setShowTerms(true); };

        const handleGenerate = (rm) => {
          setRoadmap(rm);
          setTimeout(() => {
            roadmapRef.current && roadmapRef.current.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }, 320);
        };

        return (
          <div className="min-h-screen bg-gray-950 text-white">
            <Navbar onCTA={openCTA} />
            <Hero onCTA={openCTA} onDemo={openDemo} />
            <Features />
            {roadmap && (
              <div ref={roadmapRef}>
                <RoadmapDisplay roadmap={roadmap} onRegenerate={openCTA} />
              </div>
            )}
            <Dashboard />
            <WhyStudentsLove onCTA={openCTA} />
            <CTABanner onCTA={openCTA} />
            <Footer onPrivacy={openPrivacy} onTerms={openTerms} />
            {showModal   && <Modal       onClose={() => setShowModal(false)}   onGenerate={handleGenerate} />}
            {showDemo    && <DemoModal   onClose={() => setShowDemo(false)}    onCTA={openCTA} />}
            {showPrivacy && <PrivacyModal onClose={() => setShowPrivacy(false)} />}
            {showTerms   && <TermsModal  onClose={() => setShowTerms(false)} />}
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>

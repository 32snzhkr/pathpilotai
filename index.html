                        {/* Image */}
                        <div className="univ-card-img">
                          <img
                            src={u.img} alt={u.name}
                            onError={e => { e.target.style.display='none'; e.target.parentNode.querySelector('.img-fallback').style.display='flex'; }}
                          />
                          <div className="img-fallback" style={{display:'none',position:'absolute',inset:0,background:`linear-gradient(135deg,var(--tw-gradient-stops))`,alignItems:'center',justifyContent:'center',fontSize:'2.5rem'}}>{u.flag}</div>
                          <div className="univ-card-img-overlay"/>
                          <div className="absolute bottom-3 left-4 right-4 flex items-center justify-between">
                            <div>
                              <p className="text-white font-bold text-sm leading-tight drop-shadow">{u.name}</p>
                              <p className="text-white/60 text-xs">{u.country} · {u.rank}</p>
                            </div>
                            <span className={`tag-pill border ${typeColor[u.type]}`}>{u.type}</span>
                          </div>
                        </div>
                        {/* Body */}
                        <div className="p-5">
                          <p className="text-gray-400 text-xs leading-relaxed mb-4">{u.desc}</p>
                          <div className="space-y-2.5">
                            <div className="flex items-start gap-2">
                              <span className="text-sm flex-shrink-0">💰</span>
                              <div><span className="text-xs text-gray-500 block">{t('labelTuition')}</span><span className="text-white text-sm font-semibold">{u.tuition}</span></div>
                            </div>
                            <div className="flex items-start gap-2">
                              <span className="text-sm flex-shrink-0">📊</span>
                              <div><span className="text-xs text-gray-500 block">{t('labelGpa')}</span><span className="text-white text-sm font-semibold">{u.gpa}</span></div>
                            </div>
                            <div className="flex items-start gap-2">
                              <span className="text-sm flex-shrink-0">📝</span>
                              <div>
                                <span className="text-xs text-gray-500 block mb-1">{t('labelExams')}</span>
                                <div className="flex flex-wrap gap-1">
                                  {u.exams.map((e,j) => <span key={j} className="text-xs text-indigo-300 bg-indigo-500/15 border border-indigo-500/20 rounded-full px-2 py-0.5">{e}</span>)}
                                </div>
                              </div>
                            </div>
                            <div className="flex items-start gap-2">
                              <span className="text-sm flex-shrink-0">🏆</span>
                              <div>
                                <span className="text-xs text-gray-500 block mb-1">{t('labelAchiev')}</span>
                                <div className="flex flex-wrap gap-1">
                                  {u.achievements.map((a,j) => <span key={j} className="text-xs text-gray-300 bg-white/5 border border-white/10 rounded-full px-2 py-0.5">{a}</span>)}
                                </div>
                              </div>
                            </div>
                          </div>
                        </div>
                      </div>
                    ))}
                    {filtered.length === 0 && <div className="col-span-3 text-center py-16 text-gray-500">{t('noUniv')}</div>}
                  </div>
                  <p className="text-center text-gray-600 text-xs mt-8">{t('univDisclaimer')}</p>
                </>
              )}
              {selectedUniv && <UniversityModal univ={selectedUniv} onClose={() => setSelectedUniv(null)} />}

              {activeTab === 'admitted' && (
                <div className="space-y-4">
                  <div className="glass rounded-2xl p-4 border border-green-500/20 bg-green-500/5 mb-6">
                    <p className="text-green-300 text-sm">✅ {t('admitNote')}</p>
                  </div>
                  <div className="overflow-x-auto rounded-3xl glass">
                    <table className="w-full text-sm">
                      <thead>
                        <tr className="border-b border-white/8 text-gray-400 text-xs uppercase tracking-wider">
                          {[t('thUniv'),t('thMajor'),t('thGpa'),t('thSat'),t('thIelts'),t('thProjects'),t('thExtras')].map(h => (
                            <th key={h} className="px-5 py-4 text-left font-semibold">{h}</th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {ADMITTED_PROFILES.map((p,i) => (
                          <tr key={i} className="border-b border-white/5 hover:bg-white/3 transition-colors">
                            <td className="px-5 py-4"><span className="text-white font-semibold">{p.univ}</span></td>
                            <td className="px-5 py-4 text-gray-300">{p.major}</td>
                            <td className="px-5 py-4"><span className="text-green-400 font-bold">{p.gpa}</span></td>
                            <td className="px-5 py-4 text-gray-300">{p.sat}</td>
                            <td className="px-5 py-4 text-gray-300">{p.ielts}</td>
                            <td className="px-5 py-4 text-gray-400 max-w-[180px] truncate">{p.projects}</td>
                            <td className="px-5 py-4 text-gray-400 max-w-[180px] truncate">{p.extras}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}

              {activeTab === 'rejected' && (
                <div className="space-y-4">
                  <div className="glass rounded-2xl p-4 border border-yellow-500/20 bg-yellow-500/5 mb-6">
                    <p className="text-yellow-300 text-sm">⚠️ {t('rejectNote')}</p>
                  </div>
                  <div className="overflow-x-auto rounded-3xl glass">
                    <table className="w-full text-sm">
                      <thead>
                        <tr className="border-b border-white/8 text-gray-400 text-xs uppercase tracking-wider">
                          {[t('thUniv'),t('thMajor'),t('thGpa'),t('thSat'),t('thIelts'),t('thProjects'),t('thWhyRej')].map(h => (
                            <th key={h} className="px-5 py-4 text-left font-semibold">{h}</th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {REJECTED_PROFILES.map((p,i) => (
                          <tr key={i} className="border-b border-white/5 hover:bg-white/3 transition-colors">
                            <td className="px-5 py-4"><span className="text-white font-semibold">{p.univ}</span></td>
                            <td className="px-5 py-4 text-gray-300">{p.major}</td>
                            <td className="px-5 py-4"><span className="text-red-400 font-bold">{p.gpa}</span></td>
                            <td className="px-5 py-4 text-gray-300">{p.sat}</td>
                            <td className="px-5 py-4 text-gray-300">{p.ielts}</td>
                            <td className="px-5 py-4 text-gray-400">{p.projects}</td>
                            <td className="px-5 py-4 text-red-300 text-xs">{p.note}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      }

      // ── Career Test ──────────────────────────────────────────────────────
      // Each answer adds +1 to one of: tech | business | creative | social
      const CAREER_QUESTIONS = [
        // ── Logic / Analytical Thinking (Q1–6) ──────────────────────────────
        { en:'When facing a complex problem, you prefer to:',
          ru:'Столкнувшись со сложной задачей, ты предпочитаешь:',
          opts:[
            {en:'Break it into steps and use data',          ru:'Разбить на шаги и использовать данные',              c:'tech'},
            {en:'Analyze the situation and build a strategy', ru:'Проанализировать ситуацию и построить стратегию',    c:'business'},
            {en:'Visualize possibilities and sketch ideas',  ru:'Визуализировать возможности и набросать идеи',       c:'creative'},
            {en:'Discuss with others and gather feedback',   ru:'Обсудить с другими и собрать обратную связь',        c:'social'},
          ]},
        { en:'You receive a large dataset with no instructions. You:',
          ru:'Тебе дали большой набор данных без инструкций. Ты:',
          opts:[
            {en:'Write code to process it automatically',    ru:'Пишу код для автоматической обработки',             c:'tech'},
            {en:'Look for business insights and trends',     ru:'Ищу бизнес-инсайты и тренды',                       c:'business'},
            {en:'Create a visual chart or infographic',      ru:'Создаю визуальный график или инфографику',          c:'creative'},
            {en:'Share findings with the team first',        ru:'Сначала делюсь находками с командой',                c:'social'},
          ]},
        { en:'Which type of problem excites you most?',
          ru:'Какой тип задач вдохновляет тебя больше всего?',
          opts:[
            {en:'Optimizing an algorithm or system',         ru:'Оптимизировать алгоритм или систему',               c:'tech'},
            {en:'Finding a market or business opportunity',  ru:'Найти рыночную или бизнес-возможность',             c:'business'},
            {en:'Designing a beautiful user experience',     ru:'Создать красивый пользовательский опыт',            c:'creative'},
            {en:'Improving communication between people',    ru:'Улучшить коммуникацию между людьми',                c:'social'},
          ]},
        { en:'You prefer to make decisions based on:',
          ru:'Ты предпочитаешь принимать решения на основе:',
          opts:[
            {en:'Data and technical experiments',            ru:'Данных и технических экспериментов',                c:'tech'},
            {en:'Strategy and competitive analysis',         ru:'Стратегии и конкурентного анализа',                 c:'business'},
            {en:'Intuition and aesthetic sense',             ru:'Интуиции и эстетического чутья',                    c:'creative'},
            {en:'Team consensus and shared values',          ru:'Командного консенсуса и общих ценностей',           c:'social'},
          ]},
        { en:'When a project fails, your first reaction is:',
          ru:'Когда проект не удаётся, твоя первая реакция:',
          opts:[
            {en:'Debug: find exactly what went wrong',       ru:'Отладить: найти что именно пошло не так',           c:'tech'},
            {en:'Reassess the strategy and pivot',           ru:'Пересмотреть стратегию и изменить курс',            c:'business'},
            {en:'Reimagine the whole approach creatively',   ru:'Переосмыслить весь подход творчески',               c:'creative'},
            {en:'Talk to the team to understand feelings',   ru:'Поговорить с командой и понять ситуацию',           c:'social'},
          ]},
        { en:'Your approach to learning something new:',
          ru:'Твой подход к изучению нового:',
          opts:[
            {en:'Read docs and build something hands-on',    ru:'Читаю документацию и создаю что-то своими руками',  c:'tech'},
            {en:'Study real case studies and apply lessons', ru:'Изучаю реальные кейсы и применяю уроки',            c:'business'},
            {en:'Watch tutorials and experiment freely',     ru:'Смотрю видеоуроки и свободно экспериментирую',      c:'creative'},
            {en:'Learn in a group or with a mentor',         ru:'Учусь в группе или с наставником',                  c:'social'},
          ]},
        // ── Creativity (Q7–12) ──────────────────────────────────────────────
        { en:'Which activity sounds most appealing to you?',
          ru:'Какое занятие кажется тебе наиболее привлекательным?',
          opts:[
            {en:'Building an app from scratch',              ru:'Создание приложения с нуля',                        c:'tech'},
            {en:'Writing a business or marketing plan',      ru:'Написание бизнес- или маркетингового плана',        c:'business'},
            {en:'Designing a brand identity or poster',      ru:'Разработка фирменного стиля или постера',           c:'creative'},
            {en:'Organizing a community event',              ru:'Организация мероприятия для сообщества',            c:'social'},

        { en:'How do you usually spend your free time?',

            {en:'Reading about startups and markets',        ru:'Читаю о стартапах и рынках',                        c:'business'},
            {en:'Drawing, writing, or making music',         ru:'Рисую, пишу или создаю музыку',                    c:'creative'},
            {en:'Volunteering or helping others',            ru:'Волонтёрю или помогаю другим',                      c:'social'},
          ]},
        { en:'Which best describes your personal creative style?',
          ru:'Что лучше всего описывает твой личный творческий стиль?',
          opts:[
            {en:'I create systems and efficient tools',      ru:'Я создаю системы и эффективные инструменты',       c:'tech'},
            {en:'I create strategies and winning plans',     ru:'Я создаю стратегии и планы победы',                 c:'business'},
            {en:'I create art, stories, or visuals',         ru:'Я создаю искусство, истории или визуальный контент',c:'creative'},

          ru:'Какое слово тебе ближе всего?',

            {en:'With real-life examples in conversation',   ru:'На примерах из жизни в разговоре',                  c:'social'},
          ]},
        { en:'In a team meeting, you naturally focus on:',
          ru:'На командной встрече ты обычно сосредотачиваешься на:',
          opts:[

            {en:'Goals, results, and business impact',       ru:'Целях, результатах и бизнес-влиянии',               c:'business'},
            {en:'Design, presentation, and messaging',       ru:'Дизайне, презентации и подаче информации',          c:'creative'},
            {en:'Team dynamics and how everyone feels',      ru:'Динамике команды и самочувствии каждого',           c:'social'},

        { en:'When persuading someone, you rely on:',

            {en:'Emotional appeal and visual impact',        ru:'Эмоциональное воздействие и визуальный эффект',    c:'creative'},
            {en:'Personal connection and empathy',           ru:'Личную связь и эмпатию',                           c:'social'},
          ]},
        { en:"You're asked to write an article. Your topic would be:",
          ru:'Тебя просят написать статью. Твоя тема:',
          opts:[
            {en:'How a specific technology works',           ru:'Как работает определённая технология',              c:'tech'},
            {en:'A market trend or business strategy',       ru:'Рыночный тренд или бизнес-стратегия',               c:'business'},
            {en:'A personal story or creative essay',        ru:'Личная история или творческое эссе',                c:'creative'},
            {en:'A social issue or human experience',        ru:'Социальная проблема или человеческий опыт',         c:'social'},
          ]},
        { en:'Your natural presentation style is:',
          ru:'Твой природный стиль презентации:',
          opts:[
            {en:'Technical and precise',                     ru:'Технический и точный',                              c:'tech'},
            {en:'Structured, logical, and data-driven',      ru:'Структурированный, логичный, основанный на данных', c:'business'},
            {en:'Visual, creative, and engaging',            ru:'Визуальный, творческий и захватывающий',            c:'creative'},
            {en:'Conversational, warm, and relatable',       ru:'Разговорный, тёплый и близкий людям',               c:'social'},
          ]},
        { en:'Your preferred way to share feedback is:',
          ru:'Твой предпочитаемый способ давать обратную связь:',
          opts:[
            {en:'Precise written comments with examples',    ru:'Точные письменные комментарии с примерами',         c:'tech'},
            {en:'A structured report with clear action items',ru:'Структурированный отчёт с чёткими пунктами действий',c:'business'},
            {en:'Sketches or visuals showing improvements',  ru:'Скетчи или визуализации, показывающие улучшения',   c:'creative'},
            {en:'A face-to-face conversation',               ru:'Личный разговор',                                   c:'social'},
          ]},
        // ── Leadership (Q19–24) ──────────────────────────────────────────────
        { en:'In a group project, your natural role is:',
          ru:'В групповом проекте твоя естественная роль:',
          opts:[
            {en:'The developer who builds the solution',     ru:'Разработчик, создающий решение',                    c:'tech'},
            {en:'The strategist who sets the direction',     ru:'Стратег, задающий направление',                     c:'business'},
            {en:'The designer who makes it look great',      ru:'Дизайнер, делающий всё красивым',                   c:'creative'},
            {en:'The mediator who keeps the team together',  ru:'Медиатор, удерживающий команду',                    c:'social'},
          ]},
        { en:"You're leading a struggling project. You:",
          ru:'Ты руководишь проблемным проектом. Ты:',
          opts:[
            {en:'Diagnose the technical root cause',         ru:'Диагностирую техническую первопричину',             c:'tech'},
            {en:'Reassess goals and reallocate resources',   ru:'Пересматриваю цели и перераспределяю ресурсы',      c:'business'},
            {en:'Redesign the approach from a fresh angle',  ru:'Переосмысливаю подход с новым творческим углом',    c:'creative'},
            {en:'Rebuild team trust and morale',             ru:'Восстанавливаю доверие и боевой дух команды',       c:'social'},
          ]},
        { en:'What kind of leader do you want to become?',
          ru:'Каким лидером ты хочешь стать?',

                      const pct = Math.round((score / maxPts) * 100);
                      return (
                        <div key={cat}>
                          <div className="flex items-center justify-between mb-1">
                            <span className="text-sm font-semibold text-gray-300">{r.emoji} {lang==='ru' ? r.titleRu : r.title}</span>
                            <span className="text-sm font-bold text-gray-400">{score} pts</span>
                          </div>
                          <div className="h-2 bg-white/8 rounded-full overflow-hidden">
                            <div className={`h-full rounded-full bg-gradient-to-r ${r.color} bar-grow`} style={{width:`${pct}%`}}/>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* Primary result card */}
              <div className="rounded-3xl p-8 mb-6 border border-white/12"
                style={{background:'linear-gradient(135deg,rgba(99,102,241,0.12),rgba(168,85,247,0.08),transparent)'}}>
                <div className="flex items-start gap-4 mb-5">
                  <span className="text-5xl">{primary.emoji}</span>
                  <div className="flex-1">
                    <p className="text-xs text-white/50 uppercase tracking-wider mb-1">
                      {lang==='ru' ? 'Основное направление' : 'Primary Match'}
                    </p>
                    <h2 className={`text-2xl md:text-3xl font-black bg-gradient-to-r ${primary.color} bg-clip-text text-transparent`}>
                      {lang==='ru' ? primary.titleRu : primary.title}
                    </h2>
                    <p className="text-gray-400 text-sm mt-2 leading-relaxed">
                      {lang==='ru' ? primary.descRu : primary.desc}
                    </p>
                  </div>
                </div>

                {/* Skills */}
                <div className="flex flex-wrap gap-2 mb-5">
                  {(lang==='ru' ? primary.skillsRu : primary.skills).map((s,i) => (
                    <span key={i} className="text-xs font-semibold px-3 py-1.5 rounded-full bg-white/10 text-white border border-white/10">{s}</span>
                  ))}
                </div>

                {/* Career paths — always shown */}
                <div className={`mb-5 ${isDeep ? 'grid sm:grid-cols-2 gap-5' : ''}`}>
                  <div>
                    <p className="text-xs text-gray-400 uppercase tracking-wider mb-3">
                      {lang==='ru' ? 'Карьерные пути' : 'Career Paths'}
                    </p>
                    <div className="space-y-2">
                      {primary.paths.slice(0, isDeep ? 6 : 4).map((p,i) => (
                        <div key={i} className="flex items-center gap-2 text-sm text-gray-200">
                          <span className="text-indigo-400 text-xs flex-shrink-0">→</span>{p}
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* Recommended majors — deep only */}
                  {isDeep && (
                    <div>
                      <p className="text-xs text-gray-400 uppercase tracking-wider mb-3">
                        {lang==='ru' ? 'Специальности' : 'Recommended Majors'}
                      </p>
                      <div className="space-y-2">
                        {primary.majors.map((m,i) => (
                          <div key={i} className="flex items-center gap-2 text-sm text-gray-200">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-3.5 h-3.5 text-green-400 flex-shrink-0"><polyline points="20 6 9 17 4 12"/></svg>
                            {m}
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>

                {/* Roadmap focus */}
                <div className="glass rounded-2xl p-4 border border-white/8">
                  <p className="text-xs text-indigo-300 font-semibold uppercase tracking-wider mb-2">
                    💡 {lang==='ru' ? 'Фокус поступления' : 'Roadmap Focus'}
                  </p>
                  <p className="text-sm text-gray-300 leading-relaxed">
                    {lang==='ru' ? primary.focusRu : primary.focus}
                  </p>
                </div>
              </div>

              {/* Secondary direction cards */}
              {others.length > 0 && (
                <div className="mb-8">
                  <p className="text-xs text-gray-500 uppercase tracking-widest font-semibold mb-4">
                    {lang==='ru' ? 'Дополнительные направления' : 'Secondary Directions'}
                  </p>
                  <div className={`grid gap-4 ${isDeep ? 'sm:grid-cols-3' : 'sm:grid-cols-2'}`}>
                    {others.slice(0, isDeep ? 3 : 2).map((r,i) => (
                      <div key={i} className="glass rounded-2xl p-5 border border-white/8 card-hover">
                        <div className="flex items-center gap-3 mb-3">
                          <span className="text-2xl">{r.emoji}</span>
                          <h4 className={`font-bold text-sm bg-gradient-to-r ${r.color} bg-clip-text text-transparent`}>
                            {lang==='ru' ? r.titleRu : r.title}
                          </h4>
                        </div>
                        <p className="text-gray-400 text-xs leading-relaxed mb-3">
                          {(lang==='ru' ? r.descRu : r.desc).slice(0,90)}…
                        </p>
                        <div className="flex flex-wrap gap-1">
                          {r.paths.slice(0,3).map((p,j) => (
                            <span key={j} className="text-xs text-gray-400 bg-white/5 border border-white/8 rounded-full px-2 py-0.5">{p}</span>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* Action buttons */}
              <div className="flex flex-wrap gap-3 justify-center">
                <button onClick={restart}
                  className="glass hover:bg-white/10 text-gray-300 hover:text-white font-semibold px-6 py-3 rounded-2xl transition-all btn-active">
                  {lang==='ru' ? 'Пройти снова' : 'Retake Test'}
                </button>
                {!isDeep && (
                  <button onClick={switchToDeep}
                    className="bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-white font-semibold px-6 py-3 rounded-2xl transition-all btn-active">
                    {lang==='ru' ? '🔬 Пройти глубокий тест' : '🔬 Try Deep Test (30 questions)'}
                  </button>
                )}
              </div>
              <p className="text-center text-gray-600 text-xs mt-5">
                {lang==='ru'
                  ? 'Результаты основаны на ваших ответах и служат ориентиром для исследования.'
                  : 'Results are based on your self-reported preferences and are meant to inspire exploration.'}
              </p>
            </div>
          </div>
        );
      }


      // ── App ────────────────────────────────────────────────────────────────
      function App() {
        const [page,        setPage]        = useState('home');
        const [showModal,   setShowModal]   = useState(false);
        const [showDemo,    setShowDemo]    = useState(false);
        const [showPrivacy, setShowPrivacy] = useState(false);
        const [showTerms,   setShowTerms]   = useState(false);
        const [showAuth,    setShowAuth]    = useState(false); // false | 'login' | 'signup'
        const [roadmap,     setRoadmap]     = useState(null);
        const roadmapRef = React.useRef(null);
        const { user, updateUser } = useAuth();

        const openCTA     = () => { setShowDemo(false); setShowPrivacy(false); setShowTerms(false); setShowModal(true); };
        const openDemo    = () => { setShowModal(false); setShowPrivacy(false); setShowTerms(false); setShowDemo(true); };
        const openPrivacy = () => { setShowModal(false); setShowDemo(false); setShowTerms(false); setShowPrivacy(true); };
        const openTerms   = () => { setShowModal(false); setShowDemo(false); setShowPrivacy(false); setShowTerms(true); };
        const onOpenAuth  = (mode) => { setShowAuth(mode); };

        const handleGenerate = (rm) => {
          setRoadmap(rm);
          if (user) updateUser({ roadmap: rm });
          if (page === 'home') {
            setTimeout(() => roadmapRef.current?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 320);
          } else {
            setPage('home');
          }
        };

        const goPage = (id) => { setPage(id); window.scrollTo({ top: 0, behavior: 'smooth' }); };

        return (
          <div className="min-h-screen bg-gray-950 text-white">
            <Navbar onCTA={openCTA} page={page} setPage={goPage} onOpenAuth={onOpenAuth} />

            {page === 'home' && (
              <>
                <Hero onCTA={openCTA} onDemo={openDemo} />
                <Features />
                {roadmap && (
                  <div ref={roadmapRef}>
                    <RoadmapDisplay roadmap={roadmap} onRegenerate={openCTA} />
                  </div>
                )}
                <Dashboard />
                <WhyStudentsLove onCTA={openCTA} />
                <CTABanner onCTA={openCTA} />
                <Footer onPrivacy={openPrivacy} onTerms={openTerms} />
              </>
            )}

            {page === 'dashboard'    && <UserDashboardPage onOpenAuth={onOpenAuth} onGenerateRoadmap={openCTA} />}
            {page === 'universities' && <UniversitiesPage />}
            {page === 'career-test'  && <CareerTestPage />}

            {showModal   && <Modal        onClose={() => setShowModal(false)}   onGenerate={handleGenerate} />}
            {showDemo    && <DemoModal    onClose={() => setShowDemo(false)}    onCTA={openCTA} />}
            {showPrivacy && <PrivacyModal onClose={() => setShowPrivacy(false)} />}
            {showTerms   && <TermsModal   onClose={() => setShowTerms(false)} />}
            {showAuth    && <AuthModal    mode={showAuth} onClose={() => setShowAuth(false)} />}
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(
        React.createElement(LangProvider, null,
          React.createElement(AuthProvider, null, React.createElement(App, null))
        )
      );
    </script>
  </body>
</html>
